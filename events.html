<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJIANG — Event Hub</title>
    <link rel="stylesheet" href="css/MainStyle.css">
    <link rel="stylesheet" href="css/NavBar.css">
    <link rel="stylesheet" href="css/LogIn.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #06080d; color: #fff; font-family: 'Inter', sans-serif; padding-top: 80px; }
        
        .event-hub-container { max-width: 1400px; margin: 0 auto; padding: 40px; }
        
        .hub-header { border-bottom: 1px solid rgba(0, 229, 192, 0.3); padding-bottom: 20px; margin-bottom: 40px; }
        .hub-title { font-family: 'Oswald', sans-serif; font-size: 48px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .hub-sub { color: #888; font-size: 14px; margin-top: 10px; }

        /* The Prydwen Grid */
        .event-section-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #00e5c0; display: flex; align-items: center; gap: 10px; }
        .event-section-title::before { content: ''; width: 4px; height: 24px; background: #00e5c0; display: inline-block; }
        
        .prydwen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; margin-bottom: 60px; }

        /* Prydwen-Style Image Card */
        .event-card { background: #0a0c13; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; display: flex; flex-direction: column; }
        .event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,229,192,0.3); }
        
        .event-banner { width: 100%; height: 200px; background-size: cover; background-position: center; position: relative; }
        .event-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); padding: 4px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; border-radius: 4px; backdrop-filter: blur(4px); }
        .event-badge.banner { color: #b8b0ff; border-color: #b8b0ff; }
        .event-badge.endgame { color: #f07070; border-color: #f07070; }
        
        .event-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .event-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .event-desc { font-size: 13px; color: #aaa; line-height: 1.5; margin-bottom: 20px; flex: 1; }
        
        .event-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px; }
        .event-timer { font-family: monospace; font-size: 14px; font-weight: 700; background: rgba(0,229,192,0.1); color: #00e5c0; padding: 6px 12px; border-radius: 4px; }
        .event-timer.soon { background: rgba(224,160,90,0.1); color: #f0b866; }
        
        .empty-state { grid-column: 1 / -1; padding: 60px; text-align: center; color: #555; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="event-hub-container">
        <div class="hub-header">
            <div class="hub-title">Operations Log</div>
            <div class="hub-sub">Live tracking of Current, Upcoming, and Archived events in Arknights: Endfield.</div>
        </div>

        <div class="event-section-title">ACTIVE OPERATIONS</div>
        <div class="prydwen-grid" id="grid-current">
            </div>

        <div class="event-section-title" style="color:#f0b866">UPCOMING PROTOCOLS</div>
        <div class="prydwen-grid" id="grid-upcoming">
            </div>
    </div>

    <script src="js/NavBar.js"></script>
    <script src="js/LogIn.js"></script>
    <script>
        NavBar.init({
            sections: [], // Empty because we aren't scrolling to sections on this page!
            navLinks: [
                { label: 'HOME',      target: 'index.html' },
                { label: 'EVENTS',    target: 'events.html' },
            ]
        });

        // Supabase Logic
        window.addEventListener('DOMContentLoaded', async () => {
            const SUPABASE_URL = 'https://vjcucliqjjljhgbqshmi.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqY3VjbGlxampsamhnYnFzaG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTU3MTIsImV4cCI6MjA5NDA3MTcxMn0.qq7tRmLpRjTv0y4dZxCjcEQ48rTiY5ZV1xunr32kh10';
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const { data: events } = await db.from('homepage_events').select('*');
            
            if(events) {
                const current = events.filter(e => e.status === 'current');
                const upcoming = events.filter(e => e.status === 'upcoming');

                // Render Current Events
                const gridCurrent = document.getElementById('grid-current');
                gridCurrent.innerHTML = current.length ? current.map(ev => generateCard(ev, false)).join('') : `<div class="empty-state">No active operations at this time.</div>`;

                // Render Upcoming Events
                const gridUpcoming = document.getElementById('grid-upcoming');
                gridUpcoming.innerHTML = upcoming.length ? upcoming.map(ev => generateCard(ev, true)).join('') : `<div class="empty-state">No upcoming protocols detected.</div>`;

                // Start live countdown
                setInterval(updateTimers, 1000);
            }
        });

        function generateCard(ev, isUpcoming) {
            const defaultImg = 'assets/HomepageAssets/OperatorList/LaevatainBg.png';
            const targetDate = isUpcoming ? ev.start_date : ev.end_date;
            
            return `
                <div class="event-card">
                    <div class="event-banner" style="background-image: url('${ev.banner_url || defaultImg}')">
                        <div class="event-badge ${ev.event_type.toLowerCase()}">${ev.event_type}</div>
                    </div>
                    <div class="event-content">
                        <div class="event-name">${ev.name}</div>
                        <div class="event-desc">${ev.description}</div>
                        <div class="event-footer">
                            <span style="font-size:11px; color:#666; text-transform:uppercase;">${ev.region} Server</span>
                            <div class="event-timer ${isUpcoming ? 'soon' : ''}" data-date="${targetDate || ''}" data-upcoming="${isUpcoming}">
                                CALCULATING...
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateTimers() {
            const now = new Date().getTime();
            document.querySelectorAll('.event-timer').forEach(timer => {
                const targetIso = timer.getAttribute('data-date');
                const isUpcoming = timer.getAttribute('data-upcoming') === 'true';

                if (!targetIso || targetIso === 'null') {
                    timer.innerText = "PERMANENT";
                    timer.style.color = "#888";
                    timer.style.background = "rgba(255,255,255,0.05)";
                    return;
                }

                const targetTime = new Date(targetIso).getTime();
                const distance = targetTime - now;

                if (distance < 0) {
                    timer.innerText = isUpcoming ? "STARTED" : "CONCLUDED";
                    timer.style.color = isUpcoming ? "#00e5c0" : "#f07070";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timer.innerText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            });
        }
    </script>
</body>
</html>
