<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Weapon — Arknights: Endfield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #07080b;
  --bg2:  #0c0d12;
  --bg3:  #10121a;
  --bord: rgba(255,255,255,.055);
  --bord2:rgba(255,255,255,.10);
  --text: #e4e0d8;
  --dim:  #5a5868;
  --dim2: #8a8694;
  --gold: #d4943a;
  --gold2:#f0b866;
  --accent:     #d4943a;
  --accent-dim: rgba(212,148,58,.18);
  --accent-glow:rgba(212,148,58,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.022) 3px,rgba(0,0,0,.022) 4px);}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(7,8,11,.92);border-bottom:1px solid var(--bord);backdrop-filter:blur(16px);}
.topbar-left{display:flex;align-items:center;gap:14px;}
.logo-mark{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,var(--gold),#a0601a);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:#fff;flex-shrink:0;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);}
.breadcrumb a{color:var(--dim2);text-decoration:none;}
.breadcrumb a:hover{color:var(--text);}
.breadcrumb .sep{opacity:.4;}
.breadcrumb .cur{color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.wpn-selector{background:rgba(255,255,255,.04);border:1px solid var(--bord2);border-radius:6px;padding:8px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:1px;cursor:pointer;outline:none;max-width:260px;transition:.2s;}
.wpn-selector:focus{border-color:var(--gold);background:rgba(255,255,255,.07);}
.wpn-selector option{background:#10121a;color:var(--text);}
.save-badge{display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid transparent;transition:.3s;opacity:0;}
.save-badge.show{opacity:1;}
.save-badge.saving{color:var(--gold2);border-color:rgba(240,184,102,.3);background:rgba(240,184,102,.07);}
.save-badge.saved{color:#6ddc9a;border-color:rgba(109,220,154,.3);background:rgba(109,220,154,.07);}
.save-badge.error{color:#ff6b6b;border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.07);}

/* ── LAYOUT ── */
.layout{position:relative;z-index:1;display:flex;min-height:calc(100vh - 56px);}

/* ── SIDEBAR ── */
.sidebar{width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:28px 0;background:var(--bg2);border-right:1px solid var(--bord);}
.sb-btn{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:.2s;color:var(--dim);background:transparent;position:relative;}
.sb-btn:hover{color:var(--text);background:rgba(255,255,255,.05);border-color:var(--bord2);}
.sb-btn.active{color:var(--accent);background:var(--accent-dim);border-color:var(--accent);}
.sb-btn svg{width:18px;height:18px;}
.sb-tip{position:absolute;left:calc(100% + 10px);background:var(--bg3);border:1px solid var(--bord2);border-radius:4px;padding:5px 10px;font-family:'Rajdhani',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text);white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;z-index:99;}
.sb-btn:hover .sb-tip{opacity:1;}

/* ── CARD STAGE ── */
.card-stage{flex:1;display:flex;align-items:center;justify-content:center;perspective:1400px;position:relative;padding:40px 20px;overflow:hidden;}
.stage-glow{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 60% at 50% 50%, var(--accent-glow), transparent 70%);transition:background .6s ease;}
.card-3d-wrap{width:300px;height:450px;transform-style:preserve-3d;animation:floatSpin 12s ease-in-out infinite;position:relative;z-index:1;cursor:grab;}
.card-3d-wrap:active{cursor:grabbing;}
@keyframes floatSpin{
  0%  {transform:rotateY(0deg)   rotateX(5deg) translateY(0);}
  25% {transform:rotateY(90deg)  rotateX(2deg) translateY(-8px);}
  50% {transform:rotateY(180deg) rotateX(5deg) translateY(0);}
  75% {transform:rotateY(270deg) rotateX(2deg) translateY(-8px);}
  100%{transform:rotateY(360deg) rotateX(5deg) translateY(0);}
}
.card-3d-wrap.paused{animation-play-state:paused;}
.card-face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;overflow:hidden;}
.card-front{transform:translateZ(6px);}
.card-back{transform:rotateY(180deg) translateZ(6px);}
.card-art-bg{position:absolute;inset:0;background:var(--card-bg,linear-gradient(155deg,#261a06 0%,#120c01 100%));transition:background .5s;}
.card-art-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;transition:opacity .4s;}
.card-letter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:9rem;color:var(--accent);opacity:.18;z-index:0;transition:color .5s;}
.rarity-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;z-index:5;border-radius:14px 0 0 14px;background:linear-gradient(180deg,var(--stripe-top,#ffe06a),var(--stripe-bot,#c9902a));transition:background .5s;}
.card-border-frame{position:absolute;inset:10px;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;z-index:4;pointer-events:none;box-shadow:inset 0 0 20px rgba(0,0,0,.4);}
.glass-overlay{position:absolute;inset:0;z-index:6;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.02) 35%,transparent 60%,rgba(255,255,255,.04) 100%);border:1.5px solid rgba(255,255,255,.22);border-radius:14px;}
.glass-shine{position:absolute;top:0;left:0;width:45%;height:100%;background:linear-gradient(110deg,rgba(255,255,255,.09) 0%,transparent 70%);pointer-events:none;z-index:7;border-radius:14px 0 0 14px;}
.glass-edge{position:absolute;inset:0;border-radius:14px;pointer-events:none;z-index:8;box-shadow:inset 0 1.5px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(255,255,255,.08),inset 1.5px 0 0 rgba(255,255,255,.22),inset -1px 0 0 rgba(255,255,255,.04),0 0 60px var(--accent-glow),0 0 120px rgba(0,0,0,.3);transition:box-shadow .5s;}
.card-type-badge{position:absolute;top:0;right:0;z-index:9;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;border-radius:0 14px 0 8px;background:var(--accent);color:#fff;opacity:.9;}
.card-bottom{position:absolute;bottom:0;left:0;right:0;z-index:9;padding:50px 14px 14px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.95) 60%);}
.card-wpn-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,1);margin-bottom:6px;}
.card-stars-row{display:flex;gap:3px;}
.card-star{width:10px;height:10px;transform:rotate(45deg);border-radius:1px;background:var(--gold2);opacity:.85;}
.card-level-badge{position:absolute;top:14px;left:14px;z-index:10;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--gold2);background:rgba(0,0,0,.6);border:1px solid rgba(240,184,102,.3);border-radius:4px;padding:2px 8px;backdrop-filter:blur(4px);}
.card-back-content{position:absolute;inset:0;background:linear-gradient(155deg,#0a0810,#050308);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.back-pattern{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(45deg,var(--accent) 0,var(--accent) 1px,transparent 0,transparent 50%);background-size:16px 16px;}
.back-logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:6px;color:var(--accent);opacity:.6;z-index:1;}
.back-sub{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--dim);z-index:1;}

/* ── RIGHT PANEL ── */
.right-panel{width:400px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bord);overflow-y:auto;display:flex;flex-direction:column;}
.right-panel::-webkit-scrollbar{width:4px;}
.right-panel::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px;}
.panel-head{padding:28px 28px 20px;border-bottom:1px solid var(--bord);position:sticky;top:0;background:var(--bg2);z-index:10;}
.wpn-type-label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.wpn-type-label::before{content:'';width:20px;height:1px;background:var(--accent);opacity:.7;}
.wpn-name{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#fff;line-height:1.05;margin-bottom:10px;}
.wpn-stars{display:flex;gap:5px;margin-bottom:6px;}
.wpn-star{width:13px;height:13px;transform:rotate(45deg);border-radius:1px;background:var(--gold2);box-shadow:0 0 6px var(--gold);}
.panel-body{padding:20px 28px;display:flex;flex-direction:column;gap:20px;}

/* level block */
.level-block{display:flex;flex-direction:column;gap:10px;}
.level-header{display:flex;align-items:center;justify-content:space-between;}
.level-label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);}
.level-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--accent);}
.level-val span{font-size:.85rem;color:var(--dim);font-family:'DM Sans',sans-serif;margin-left:2px;}
.slider-wrap{position:relative;height:6px;cursor:grab;margin-bottom:4px;}
.slider-wrap:active{cursor:grabbing;}
.slider-bg{position:absolute;inset:0;border-radius:3px;background:rgba(255,255,255,.07);}
.slider-fill{position:absolute;top:0;left:0;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--gold2));transition:width .06s;}
.slider-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--gold2);border:2px solid #fff;box-shadow:0 0 10px var(--accent-glow);transition:left .06s;}
.slider-labels{display:flex;justify-content:space-between;font-size:.6rem;color:var(--dim);margin-top:6px;}

/* milestone pips */
.milestone-row{display:flex;justify-content:space-between;position:relative;margin-top:-2px;}
.milestone-row::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.04);}
.milestone-pip{width:4px;height:8px;border-radius:2px;background:rgba(255,255,255,.15);position:relative;z-index:1;transition:.3s;}
.milestone-pip.reached{background:var(--accent);box-shadow:0 0 6px var(--accent-glow);}

/* stat block */
.stat-block{background:rgba(0,0,0,.25);border:1px solid var(--bord);border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-left:3px solid var(--accent);}
.stat-block-left{display:flex;align-items:center;gap:10px;}
.stat-icon-wrap{width:28px;height:28px;border-radius:6px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;}
.stat-icon-wrap svg{width:14px;height:14px;}
.stat-block-label{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim2);}
.stat-block-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;color:#fff;transition:.3s;}
.stat-block-val.bump{color:var(--gold2);transform:scale(1.12);}

/* sub stats */
.sub-stats{display:flex;gap:8px;flex-wrap:wrap;}
.sub-stat{flex:1;min-width:100px;background:rgba(0,0,0,.2);border:1px solid var(--bord);border-radius:6px;padding:10px 12px;}
.sub-stat-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);margin-bottom:4px;}
.sub-stat-val{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:var(--text);transition:.3s;}
.sub-stat-val.bump{color:var(--gold2);}

/* divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--bord2),transparent);}

/* passive */
.passive-block{background:rgba(0,0,0,.2);border:1px solid var(--bord);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.passive-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
.passive-text{font-size:.75rem;color:var(--dim2);line-height:1.65;}
.passive-text .scaled-val{color:var(--gold2);font-weight:700;transition:color .3s;}
.flavor-text{font-size:.7rem;color:var(--dim);font-style:italic;line-height:1.65;border-left:2px solid rgba(212,148,58,.3);padding-left:10px;}

/* notes / tags */
.notes-block{background:rgba(0,0,0,.2);border:1px solid var(--bord);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.notes-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;justify-content:space-between;}
.notes-autosave{font-size:.55rem;color:var(--dim);font-weight:400;letter-spacing:1px;}
.notes-textarea{background:rgba(255,255,255,.03);border:1px solid var(--bord);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;padding:10px 12px;resize:vertical;min-height:72px;outline:none;transition:.2s;line-height:1.6;}
.notes-textarea:focus{border-color:var(--accent);background:rgba(255,255,255,.05);}
.notes-textarea::placeholder{color:var(--dim);}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.tag-chip{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--accent-dim);border:1px solid rgba(255,255,255,.08);color:var(--accent);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;}
.tag-chip:hover{background:rgba(255,255,255,.08);border-color:var(--bord2);color:var(--text);}
.tag-chip .tag-x{opacity:.5;font-size:.7rem;}
.tag-add-wrap{display:flex;gap:6px;margin-top:4px;}
.tag-input{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--bord);border-radius:4px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1px;padding:5px 10px;outline:none;transition:.2s;}
.tag-input:focus{border-color:var(--accent);}
.tag-input::placeholder{color:var(--dim);}
.tag-add-btn{background:var(--accent-dim);border:1px solid var(--accent);border-radius:4px;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1px;padding:5px 12px;cursor:pointer;transition:.15s;}
.tag-add-btn:hover{background:var(--accent);color:#fff;}

/* track modal */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(4,3,10,.88);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-box{width:600px;max-width:92vw;background:linear-gradient(145deg,#100b1a,#0a0712);border:1px solid rgba(200,160,255,.15);border-radius:12px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);transform:translateY(24px) scale(.96);transition:.3s;}
.modal-overlay.show .modal-box{transform:translateY(0) scale(1);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bord);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:#f0e8ff;display:flex;align-items:center;gap:10px;}
.modal-close{cursor:pointer;color:var(--dim);font-size:20px;transition:.2s;}
.modal-close:hover{color:#fff;}
.track-row{display:flex;align-items:center;gap:16px;margin-bottom:22px;background:rgba(255,255,255,.03);padding:12px 16px;border-radius:8px;border:1px solid var(--bord);}
.track-group{display:flex;align-items:center;gap:8px;}
.track-group label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);}
.track-input{background:rgba(0,0,0,.4);border:1px solid rgba(200,160,255,.2);color:#e8d8ff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;width:64px;padding:5px 8px;border-radius:4px;text-align:center;outline:none;}
.track-input:focus{border-color:var(--gold);}
.track-arrow{color:var(--dim);font-size:1.2rem;font-weight:700;}
.mat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.mat-card{background:rgba(255,255,255,.03);border:1px solid var(--bord);border-radius:8px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden;}
.mat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.r-gold::before{background:var(--gold);}
.r-purple::before{background:#a260c0;}
.r-blue::before{background:#428fdc;}
.r-gray::before{background:#808088;}
.mat-icon{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.3);border:1px solid var(--bord2);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);margin-bottom:9px;}
.mat-name{font-size:.68rem;color:var(--dim2);line-height:1.3;min-height:26px;display:flex;align-items:center;text-align:center;}
.mat-qty{margin-top:7px;font-size:.8rem;font-weight:700;color:#e8d8ff;background:rgba(0,0,0,.4);padding:3px 10px;border-radius:10px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}

/* loading */
.loading-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s;}
.loading-overlay.hide{opacity:0;pointer-events:none;}
.loading-ring{width:40px;height:40px;border:3px solid var(--bord2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim2);}

/* skills */
.skill-item{display:flex;flex-direction:column;gap:6px;}
.skill-header{display:flex;align-items:center;justify-content:space-between;}
.skill-name-wrap{display:flex;align-items:center;gap:8px;}
.skill-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.skill-name{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text);}
.skill-desc{font-size:.72rem;color:var(--dim2);line-height:1.6;padding-left:14px;border-left:1px solid var(--bord);transition:transform .12s;}
.hl{color:#7ab8ff;font-weight:600;}
.hl-atk{color:var(--gold2);font-weight:600;}
.skill-controls{display:flex;align-items:center;gap:8px;}
.skill-btn{width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,.07);border:1px solid var(--bord2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;font-weight:400;transition:.18s;line-height:1;}
.skill-btn:hover:not(:disabled){background:var(--accent);border-color:var(--accent);color:#fff;}
.skill-btn:disabled{opacity:.28;cursor:not-allowed;}
.skill-lv{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1px;color:var(--gold2);min-width:32px;text-align:center;}

/* recommended badge */
.rec-row{display:flex;flex-wrap:wrap;gap:6px;}

<body>

<!-- Loading -->

  <div class="loading-ring"></div>
  <div class="loading-text">Loading Arsenal</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">EF</div>
    <div class="breadcrumb">
      <a href="#">Weapons</a>

<div class="layout">

<script>
/* =========================================================
   SUPABASE CONFIG
   ========================================================= */
const SUPABASE_URL      = 'https://vjcucliqjjljhgbqshmi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqY3VjbGlxampsamhnYnFzaG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTU3MTIsImV4cCI6MjA5NDA3MTcxMn0.qq7tRmLpRjTv0y4dZxCjcEQ48rTiY5ZV1xunr32kh10';

const sbHeaders = {
  'Content-Type':  'application/json',
  'apikey':        SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
};

async function sbGet(table, params = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: sbHeaders });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbUpsert(table, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...sbHeaders, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
}

/* =========================================================
   STATIC CONFIGS (visual / gameplay constants only — no weapon data)
   ========================================================= */
const TYPE_CFG = {
  'Sword':      { accent:'#e05a2b', dim:'rgba(224,90,43,.18)',  glow:'rgba(224,90,43,.22)',  card:'linear-gradient(155deg,#2a0e08,#170402)', stripeTop:'#ff8a65', stripeBot:'#8a2a10' },
  'Greatsword': { accent:'#d4943a', dim:'rgba(212,148,58,.18)',  glow:'rgba(212,148,58,.22)',  card:'linear-gradient(155deg,#261a06,#120c01)', stripeTop:'#ffe06a', stripeBot:'#c9902a' },
  'Polearm':    { accent:'#2a8c52', dim:'rgba(42,140,82,.15)',   glow:'rgba(42,140,82,.2)',   card:'linear-gradient(155deg,#091e0f,#030d06)', stripeTop:'#6ddc9a', stripeBot:'#1a6034' },
  'Handcannon': { accent:'#3b82f6', dim:'rgba(59,130,246,.15)',  glow:'rgba(59,130,246,.2)',  card:'linear-gradient(155deg,#091428,#040b17)', stripeTop:'#7ab8ff', stripeBot:'#1a3870' },
  'Arts Unit':  { accent:'#a855f7', dim:'rgba(168,85,247,.15)',  glow:'rgba(168,85,247,.2)',  card:'linear-gradient(155deg,#160820,#0b0312)', stripeTop:'#c89eff', stripeBot:'#5a189a' },
};

const RARITY_STRIPE = {

};

const MAX_LEVEL  = { 6:90, 5:80, 4:70, 3:60 };
const ATK_MIN    = { 6:48, 5:38, 4:32, 3:27 };

/* =========================================================
   SUBSTAT SCALING
   ========================================================= */
const SUBSTAT_SCALE = {
  atk_pct:   { min:0.60, label:(v)=>`Attack +${v.toFixed(2)}%` },
  crit_rate: { min:0.60, label:(v)=>`Critical Rate +${v.toFixed(2)}%` },
  phys_dmg:  { min:0.60, label:(v)=>`Physical DMG Bonus +${v.toFixed(2)}%` },
  arts_dmg:  { min:0.60, label:(v)=>`Arts DMG Bonus +${v.toFixed(2)}%` },
  heat_dmg:  { min:0.60, label:(v)=>`Heat DMG Bonus +${v.toFixed(2)}%` },
  cryo_dmg:  { min:0.60, label:(v)=>`Cryo DMG Bonus +${v.toFixed(2)}%` },
  elec_dmg:  { min:0.60, label:(v)=>`Electric DMG Bonus +${v.toFixed(2)}%` },
  nat_dmg:   { min:0.60, label:(v)=>`Nature DMG Bonus +${v.toFixed(2)}%` },
  treat_bon: { min:0.60, label:(v)=>`Treatment Bonus +${v.toFixed(2)}%` },
  max_hp:    { min:0.60, label:(v)=>`Max HP +${v.toFixed(2)}%` },
  ult_gain:  { min:0.60, label:(v)=>`Ultimate Gain Eff. +${v.toFixed(2)}%` },
  arts_int:  { min:0.50, label:(v)=>`Arts Intensity +${Math.round(v)}` },
  will:      { min:0.50, label:(v)=>`Will +${Math.round(v)}` },
  intellect: { min:0.50, label:(v)=>`Intellect +${Math.round(v)}` },
  agility:   { min:0.50, label:(v)=>`Agility +${Math.round(v)}` },
  strength:  { min:0.50, label:(v)=>`Strength +${Math.round(v)}` },
  main_attr: { min:0.50, label:(v)=>`Main Attribute +${Math.round(v)}` },
};

function parseStatString(s) {
  if (!s || s === '—') return null;
  const patterns = [
    { re:/^Attack \+([0-9.]+)%/,              key:'atk_pct',   pct:true  },
    { re:/^Critical Rate \+([0-9.]+)%/,       key:'crit_rate', pct:true  },
    { re:/^Physical DMG Bonus \+([0-9.]+)%/,  key:'phys_dmg',  pct:true  },
    { re:/^Arts DMG Bonus \+([0-9.]+)%/,      key:'arts_dmg',  pct:true  },
    { re:/^Heat DMG Bonus \+([0-9.]+)%/,      key:'heat_dmg',  pct:true  },
    { re:/^Cryo DMG (?:Dealt|Bonus) \+([0-9.]+)%/, key:'cryo_dmg', pct:true },
    { re:/^Electric DMG Bonus \+([0-9.]+)%/,  key:'elec_dmg',  pct:true  },
    { re:/^Nature DMG Bonus \+([0-9.]+)%/,    key:'nat_dmg',   pct:true  },
    { re:/^Treatment Bonus \+([0-9.]+)%/,     key:'treat_bon', pct:true  },
    { re:/^Max HP \+([0-9.]+)%/,              key:'max_hp',    pct:true  },
    { re:/^Ultimate Gain Eff\. \+([0-9.]+)%/, key:'ult_gain',  pct:true  },
    { re:/^Ultimate Gain Efficiency \+([0-9.]+)%/, key:'ult_gain', pct:true },
    { re:/^Arts Intensity \+([0-9]+)/,         key:'arts_int',  pct:false },
    { re:/^Will(?:power)? \+([0-9]+)/,         key:'will',      pct:false },
    { re:/^Intellect \+([0-9]+)/,              key:'intellect', pct:false },
    { re:/^Agility \+([0-9]+)/,               key:'agility',   pct:false },
    { re:/^Strength \+([0-9]+)/,              key:'strength',  pct:false },
    { re:/^Main Attribute \+([0-9]+)/,         key:'main_attr', pct:false },
  ];
  for (const p of patterns) {
    const m = s.match(p.re);
    if (m) return { key: p.key, maxVal: parseFloat(m[1]), isPct: p.pct };
  }
  return { key: null, maxVal: null, raw: s };
}

function scaledSubstat(parsed, level, maxLv) {
  if (!parsed || !parsed.key) return parsed?.raw ?? '—';
  const cfg = SUBSTAT_SCALE[parsed.key];
  if (!cfg) return parsed.raw ?? '—';
  const t   = (level - 1) / (maxLv - 1);
  const val = parsed.maxVal * (cfg.min + (1 - cfg.min) * t);
  return cfg.label(val);
}

/* =========================================================

   ========================================================= */

  return `${label} <span class="hl">+${typeof v === 'number' && !Number.isInteger(v) ? v.toFixed(1) : v}</span>`;
}

}

/* Alias map: DB skill_id → SKILL_RENDERS key (when they differ)
   NOTE: suppression_fin_chaser_s_intent is NO LONGER aliased to suppression_emergency_boost.
   It now has its own dedicated render function above that handles the {a, c} object data. */
const SKILL_ID_ALIASES = {
  'fracture_artzy':             'fracture_artzy',
  'detonate_brigands_bane':     'detonate_brigands_bane',
  'medicant_glory_of_knighthood': 'medicant_glory',
  'medicant_redemption_of_faith': 'medicant_redemption',
  'detonate_imposing_champion': 'detonate_imposing_champ',
  'detonate_seeker_of_the_esoteric': 'detonate_seeker',
  'infliction_lone_and_distant_sail': 'infliction_lone_distant_sail',
  'infliction_wedge_of_civilization': 'infliction_wedge',
  'infliction_road_home_for_all_life': 'infliction_road_home',
  'inspiring_back_to_the_broken_city': 'inspiring_back_to_city',
  'inspiring_start_of_a_saga':  'inspiring_start_of_saga',
  'inspiring_mortise_and_tenon_analysis': 'inspiring_mortise',
  'pursuit_aid_from_the_past':  'pursuit_aid_from_past',
  'combative_anthem_of_cinder': 'combative_anthem',
  'efficacy_overlapping_flickers': 'flow_overlapping',
  'efficacy_weight_of_mountain': 'suppression_weight_of_mountain',
  'efficacy_mincing_therapy':   'medicant_mincing_therapy',
  'efficacy_tenacious_will':    'efficacy_tenacious_will',
  'suppression_olden_moon':     'infliction_olden_moon',
  /* suppression_fin_chaser_s_intent intentionally removed from aliases —
     it now resolves directly to its own SKILL_RENDERS entry */
};

/**
 * Given a DB skill_id, return the render function.
 * Falls back through: exact match → alias → slug → generic.
 */
function resolveRenderFn(skillId, skillName, data) {
  // 1. exact match
  if (SKILL_RENDERS[skillId]) return SKILL_RENDERS[skillId];
  // 2. alias
  const alias = SKILL_ID_ALIASES[skillId];
  if (alias && SKILL_RENDERS[alias]) return SKILL_RENDERS[alias];
  // 3. slug from skill_name
  const slug = (skillName || '')
    .toLowerCase().replace(/['']/g, '_').replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  if (SKILL_RENDERS[slug]) return SKILL_RENDERS[slug];
  const aliasSlug = SKILL_ID_ALIASES[slug];
  if (aliasSlug && SKILL_RENDERS[aliasSlug]) return SKILL_RENDERS[aliasSlug];
  // 4. generic fallback
  const sample = Array.isArray(data) ? data[0] : null;
  if (sample !== null && typeof sample === 'object') {
    return (v) => Object.entries(v)
      .map(([k, val]) => `${k.toUpperCase()}: <span class="hl">${typeof val === 'number' ? val.toFixed(1) : val}</span>`)
      .join(' · ');
  }
  return (v) => `<span class="hl">${typeof v === 'number' ? v.toFixed(1) : v}</span>`;
}

/* =========================================================
   STATE
   ========================================================= */
let WEAPONS          = [];
let DB_WEAPON_SKILLS = {};
let curWeapon        = null;
let curLevel         = 90;
let curTags          = [];
let skillLevels      = {};
let dragging         = false;
let saveTimer        = null;
let parsedStats      = { stat1: null, stat2: null };

/* =========================================================
   SUPABASE: FETCH WEAPONS
   ========================================================= */
async function fetchWeapons() {
  const data = await sbGet('weapons', 'select=*&order=rarity.desc,type.asc,name.asc');
  WEAPONS = data;
}

/* =========================================================
   SUPABASE: FETCH ALL WEAPON SKILLS
   ========================================================= */
async function fetchAllWeaponSkills() {
  const rows = await sbGet('weapon_skills', 'select=*&order=id.asc,skill_index.asc');
  DB_WEAPON_SKILLS = {};
  for (const row of rows) {
    if (!DB_WEAPON_SKILLS[row.id]) DB_WEAPON_SKILLS[row.id] = [];
    const data    = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
    const renderFn = resolveRenderFn(row.skill_id, row.skill_name, data);
    DB_WEAPON_SKILLS[row.id].push({
      id:        row.skill_id,
      name:      row.skill_name,
      maxLv:     row.max_lv,
      defaultLv: row.default_lv,
      data,
      render:    renderFn,
    });
  }
}

/* =========================================================
   SUPABASE: PROGRESS TABLE
   ========================================================= */
async function fetchProgress(weaponId) {
  try {
    const rows = await sbGet('weapon_progress', `select=*&weapon_id=eq.${weaponId}`);
    return rows[0] || null;
  } catch { return null; }
}

async function saveProgress(weaponId, level, notes, tags) {
  setSaveBadge('saving');
  try {
    await sbUpsert('weapon_progress', {
      weapon_id:  weaponId,
      level,
      notes,
      tags,
      updated_at: new Date().toISOString(),
    });
    setSaveBadge('saved');
  } catch (e) {
    console.error('Save failed:', e);
    setSaveBadge('error');
  }
}

function setSaveBadge(state) {
  const el = document.getElementById('saveBadge');
  el.className = `save-badge show ${state}`;
  const labels = { saving:'● Saving…', saved:'● Saved', error:'● Save failed' };
  el.textContent = labels[state] || '';
  if (state === 'saved' || state === 'error') {
    setTimeout(() => { el.className = 'save-badge'; }, 2200);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (!curWeapon) return;
    saveProgress(curWeapon.id, curLevel, document.getElementById('notesArea').value, curTags);
  }, 900);
}

/* =========================================================
   POPULATE SELECTOR
   ========================================================= */
function populateSelector() {
  const sel = document.getElementById('wpnSelector');
  sel.innerHTML = '<option value="" disabled>Select Weapon…</option>';
  const groups = { 6:[], 5:[], 4:[], 3:[] };
  WEAPONS.forEach(w => groups[w.rarity]?.push(w));
  [6,5,4,3].forEach(r => {
    if (!groups[r].length) return;
    const og = document.createElement('optgroup');
    og.label = `${'★'.repeat(r)} (${r}-Star)`;
    groups[r].forEach(w => {
      const o = document.createElement('option');
      o.value = w.id;
      o.textContent = `${w.name} · ${w.type}`;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
}

/* =========================================================
   LOAD WEAPON
   ========================================================= */
async function loadWeapon(id) {
  const w = WEAPONS.find(x => x.id === id);
  if (!w) return;
  curWeapon = w;
  skillLevels = {};

  const cfg   = TYPE_CFG[w.type] || TYPE_CFG['Sword'];
  const maxLv = MAX_LEVEL[w.rarity] || 90;

  /* theme */
  document.documentElement.style.setProperty('--accent', cfg.accent);
  document.documentElement.style.setProperty('--accent-dim', cfg.dim);
  document.documentElement.style.setProperty('--accent-glow', cfg.glow);

  /* card */
  document.getElementById('cardBg').style.background    = cfg.card;
  document.getElementById('cardLetter').textContent     = w.name.charAt(0);
  document.getElementById('cardLetter').style.color     = cfg.accent;
  const imgEl = document.getElementById('cardImg');
  if (w.img) { imgEl.src = w.img; imgEl.style.opacity = '1'; }
  else        { imgEl.src = ''; imgEl.style.opacity = '0'; }
  const rc = RARITY_STRIPE[w.rarity] || RARITY_STRIPE[6];
  document.getElementById('rarityStripe').style.background =
    `linear-gradient(180deg,${rc.top},${rc.bot})`;
  document.getElementById('cardTypeBadge').textContent   = w.type;
  document.getElementById('cardTypeBadge').style.background = cfg.accent;
  document.getElementById('cardWpnName').textContent     = w.name;
  buildCardStars(w.rarity);
  document.getElementById('glassEdge').style.boxShadow  =
    `inset 0 1.5px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(255,255,255,.08),` +
    `inset 1.5px 0 0 rgba(255,255,255,.22),inset -1px 0 0 rgba(255,255,255,.04),` +
    `0 0 60px ${cfg.glow},0 0 120px rgba(0,0,0,.3)`;
  document.getElementById('backPattern').style.backgroundImage =
    `repeating-linear-gradient(45deg,${cfg.accent} 0,${cfg.accent} 1px,transparent 0,transparent 50%)`;

  /* breadcrumb / title */
  document.getElementById('bc-name').textContent = w.name;
  document.title = `${w.name} — Arknights: Endfield`;

  /* panel */
  document.getElementById('panelTypeLabel').textContent = w.type;
  document.getElementById('panelWpnName').textContent   = w.name;
  buildPanelStars(w.rarity);

  /* slider max */
  document.getElementById('sliderMaxLabel').textContent = maxLv;
  document.getElementById('trackEnd').max   = maxLv;
  document.getElementById('trackEnd').value = maxLv;

  /* substats */
  parsedStats.stat1 = parseStatString(w.stat1);
  parsedStats.stat2 = parseStatString(w.stat2);

  /* milestone pips */
  buildMilestonePips(w.rarity);

  /* flavor */
  const flav = document.getElementById('flavorText');
  flav.textContent    = w.flavor || '';
  flav.style.display  = w.flavor ? '' : 'none';

  /* recommended for */
  const recBlock = document.getElementById('recBlock');
  const recRow   = document.getElementById('recRow');
  const recs     = Array.isArray(w.recommended_for) ? w.recommended_for.filter(Boolean) : [];
  if (recs.length) {
    recBlock.style.display = '';
    recRow.innerHTML = recs.map(r => `<span class="rec-badge">${r}</span>`).join('');
  } else {
    recBlock.style.display = 'none';
  }

  /* selector sync */
  document.getElementById('wpnSelector').value = id;

  /* init skill levels from DB defaults */
  const skills = DB_WEAPON_SKILLS[id] || [];
  skills.forEach((sk, i) => { skillLevels[i] = sk.defaultLv; });

  /* progress */
  const progress   = await fetchProgress(id);
  const savedLevel = progress?.level ?? maxLv;
  curTags = progress?.tags ?? [];
  document.getElementById('notesArea').value = progress?.notes ?? '';
  renderTags();

  updateLevel(savedLevel);
}

/* =========================================================
   STARS
   ========================================================= */
function buildCardStars(r) {
  document.getElementById('cardStars').innerHTML =
    Array(r).fill('<div class="card-star"></div>').join('');
}
function buildPanelStars(r) {
  document.getElementById('panelStars').innerHTML =
    Array(r).fill('<div class="wpn-star"></div>').join('');
}

/* =========================================================
   MILESTONE PIPS
   ========================================================= */
function buildMilestonePips(rarity) {
  const pips = MILESTONES[rarity] || [];
  document.getElementById('milestonePips').innerHTML =
    pips.map(m => `<div class="milestone-pip" data-lv="${m}" title="Lv.${m}"></div>`).join('');
}

function updateMilestonePips(level) {
  document.querySelectorAll('.milestone-pip').forEach(p => {
    p.classList.toggle('reached', level >= parseInt(p.dataset.lv));
  });
}

/* =========================================================
   LEVEL UPDATE
   ========================================================= */
function lerp(a, b, t) { return a + (b - a) * t; }

function updateLevel(lv) {
  const w = curWeapon; if (!w) return;
  const maxLv = MAX_LEVEL[w.rarity] || 90;
  lv = Math.max(1, Math.min(maxLv, lv));
  curLevel = lv;

  const t   = (lv - 1) / (maxLv - 1);
  const pct = t * 100;

  document.getElementById('sliderFill').style.width  = pct + '%';
  document.getElementById('sliderThumb').style.left  = pct + '%';
  document.getElementById('lvDisplay').innerHTML     = `${lv}<span>/ ${maxLv}</span>`;
  document.getElementById('cardLevelBadge').textContent = `LV ${lv}`;

  updateMilestonePips(lv);

  /* ATK scaling */
  const atkMin = ATK_MIN[w.rarity] || 48;
  const atkMax = w.base_atk || 400;
  const atk    = Math.round(lerp(atkMin, atkMax, t));
  const atkEl  = document.getElementById('atkDisplay');
  atkEl.textContent = atk;
  atkEl.classList.remove('bump');
  void atkEl.offsetWidth;
  atkEl.classList.add('bump');
  setTimeout(() => atkEl.classList.remove('bump'), 320);

  /* Sub-stats */
  buildSubStats(w, lv, maxLv);

  /* Skills */
  buildSkills(w, lv, maxLv);

  scheduleSave();
}

/* =========================================================
   SUB-STATS
   ========================================================= */
function buildSubStats(w, level, maxLv) {
  const el    = document.getElementById('subStats');
  const stats = [
    { parsed: parsedStats.stat1, raw: w.stat1 },
    { parsed: parsedStats.stat2, raw: w.stat2 },
  ].filter(s => s.raw && s.raw !== '—' && s.raw !== null);

  el.innerHTML = stats.map(({ parsed, raw }) => {
    const val = parsed?.key ? scaledSubstat(parsed, level, maxLv) : (raw || '—');
    return `<div class="sub-stat">
      <div class="sub-stat-label">Substat</div>
      <div class="sub-stat-val">${val}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('.sub-stat-val').forEach(v => {
    v.classList.remove('bump');
    void v.offsetWidth;
    v.classList.add('bump');
    setTimeout(() => v.classList.remove('bump'), 320);
  });
}

/* =========================================================
   BUILD SKILLS (from DB_WEAPON_SKILLS)
   ========================================================= */
function buildSkills(w) {
  const container = document.getElementById('skillsContainer');
  const skills    = DB_WEAPON_SKILLS[w.id] || [];

  if (!skills.length) {
    container.innerHTML = `<div class="passive-block">
      <div class="passive-label">Passive</div>
      <div class="passive-text">${w.passive_name ? `<strong>${w.passive_name}</strong><br>` : ''}${w.passive_lv9 || '—'}</div>
    </div>`;
    return;
  }

  container.innerHTML = skills.map((sk, idx) => {
    const lv   = skillLevels[idx] ?? sk.defaultLv;
    const val  = sk.data[lv - 1];
    const desc = sk.render ? sk.render(val) : String(val);
    return `<div class="skill-item" id="skill-item-${idx}">
      <div class="skill-header">
        <div class="skill-name-wrap">
          <div class="skill-dot"></div>
          <div class="skill-name">${sk.name}</div>
        </div>
        ${sk.maxLv > 1 ? `
        <div class="skill-controls">
          <button class="skill-btn" onclick="changeSkillLv(${idx},-1)" id="skill-dn-${idx}">−</button>
          <span class="skill-lv" id="skill-lv-${idx}">Lv.${lv}/${sk.maxLv}</span>
          <button class="skill-btn" onclick="changeSkillLv(${idx},1)" id="skill-up-${idx}">+</button>
        </div>` : ''}
      </div>
      <div class="skill-desc" id="skill-desc-${idx}">${desc}</div>
    </div>`;
  }).join('<div style="height:4px"></div>');

  /* Update button states */
  skills.forEach((sk, idx) => updateSkillBtns(idx, sk));
}

function changeSkillLv(idx, delta) {
  const w      = curWeapon; if (!w) return;
  const skills = DB_WEAPON_SKILLS[w.id] || [];
  const sk     = skills[idx]; if (!sk) return;
  const lv     = Math.max(1, Math.min(sk.maxLv, (skillLevels[idx] ?? sk.defaultLv) + delta));
  skillLevels[idx] = lv;
  const val  = sk.data[lv - 1];
  const desc = sk.render ? sk.render(val) : String(val);
  document.getElementById(`skill-desc-${idx}`).innerHTML = desc;
  document.getElementById(`skill-lv-${idx}`).textContent = `Lv.${lv}/${sk.maxLv}`;
  updateSkillBtns(idx, sk);
}

function updateSkillBtns(idx, sk) {
  const lv = skillLevels[idx] ?? sk.defaultLv;
  const dn = document.getElementById(`skill-dn-${idx}`);
  const up = document.getElementById(`skill-up-${idx}`);
  if (dn) dn.disabled = lv <= 1;
  if (up) up.disabled = lv >= sk.maxLv;
}

/* =========================================================
   SLIDER DRAG
   ========================================================= */
(function initSlider() {
  const wrap  = document.getElementById('sliderWrap');

  function posPct(e) {
    const r = wrap.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    return Math.max(0, Math.min(1, x / r.width));
  }

  wrap.addEventListener('mousedown', e => {
    dragging = true;
    document.getElementById('card3d').classList.add('paused');
    const maxLv = curWeapon ? MAX_LEVEL[curWeapon.rarity] || 90 : 90;
    updateLevel(Math.round(posPct(e) * (maxLv - 1)) + 1);
  });
  wrap.addEventListener('touchstart', e => {
    dragging = true;
    const maxLv = curWeapon ? MAX_LEVEL[curWeapon.rarity] || 90 : 90;
    updateLevel(Math.round(posPct(e) * (maxLv - 1)) + 1);
  }, { passive: true });
  document.addEventListener('mousemove', e => {
    if (!dragging || !curWeapon) return;
    const maxLv = MAX_LEVEL[curWeapon.rarity] || 90;
    updateLevel(Math.round(posPct(e) * (maxLv - 1)) + 1);
  });
  document.addEventListener('touchmove', e => {
    if (!dragging || !curWeapon) return;
    const maxLv = MAX_LEVEL[curWeapon.rarity] || 90;
    updateLevel(Math.round(posPct(e) * (maxLv - 1)) + 1);
  }, { passive: true });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; document.getElementById('card3d').classList.remove('paused'); }
  });
  document.addEventListener('touchend', () => { dragging = false; });
})();

/* =========================================================
   TAGS
   ========================================================= */
function renderTags() {
  const row = document.getElementById('tagsRow');
  if (!curTags.length) { row.innerHTML = ''; return; }
  row.innerHTML = curTags.map((t, i) =>
    `<div class="tag-chip" onclick="removeTag(${i})">${t}<span class="tag-x">✕</span></div>`
  ).join('');
}

function addTag() {
  const inp = document.getElementById('tagInput');
  const val = inp.value.trim();
  if (!val || curTags.includes(val) || curTags.length >= 8) { inp.value = ''; return; }
  curTags.push(val);
  inp.value = '';
  renderTags();
  scheduleSave();
}

function removeTag(i) {
  curTags.splice(i, 1);
  renderTags();
  scheduleSave();
}

document.getElementById('tagInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTag();
});

document.getElementById('notesArea').addEventListener('input', scheduleSave);

/* =========================================================
   SIDEBAR
   ========================================================= */
function setSbActive(id) {
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sb-' + id).classList.add('active');
}

function openTrack() {
  setSbActive('track');
  document.getElementById('trackModal').classList.add('show');
  updateTrackMats();
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('trackModal').classList.remove('show');
  setSbActive('details');
});
document.getElementById('trackModal').addEventListener('click', e => {
  if (e.target === document.getElementById('trackModal')) {
    document.getElementById('trackModal').classList.remove('show');
    setSbActive('details');
  }
});

/* =========================================================
   TRACK MATS
   ========================================================= */
const MAT_DB = {
  tcreds:     { name:'T-Creds',        css:'r-gray',   icon:'<circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 10h8M8 14h8"/>' },
  cast_die:   { name:'Cast Die',       css:'r-blue',   icon:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>' },
  kalkonyx:   { name:'Kalkonyx',       css:'r-blue',   icon:'<polygon points="12 2 2 7 12 22 22 7 12 2"/>' },
  auronyx:    { name:'Auronyx',        css:'r-purple', icon:'<polygon points="12 2 2 7 12 22 22 7 12 2"/>' },
  heavy_cast: { name:'Heavy Cast Die', css:'r-purple', icon:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>' },
  d96_steel:  { name:'D96 Steel',      css:'r-purple', icon:'<rect x="2" y="8" width="20" height="8" rx="2"/><path d="M6 8v8M18 8v8"/>' },
  umbronyx:   { name:'Umbronyx',       css:'r-gold',   icon:'<polygon points="12 2 2 7 12 22 22 7 12 2"/>' },
  wulingstone:{ name:'Wulingstone',    css:'r-gold',   icon:'<polygon points="12 2 2 7 12 22 22 7 12 2"/>' },
};

function updateTrackMats() {
  const w = curWeapon; if (!w) return;
  const maxLv = MAX_LEVEL[w.rarity] || 90;
  let start = parseInt(document.getElementById('trackStart').value) || 1;
  let end   = parseInt(document.getElementById('trackEnd').value)   || maxLv;
  if (start < 1) start = 1;
  if (end > maxLv) end = maxLv;
  if (start >= end) end = start + 1;

  const t = { tcreds:0, cast_die:0, kalkonyx:0, auronyx:0, heavy_cast:0, d96_steel:0, umbronyx:0, wulingstone:0 };
  for (let i = start + 1; i <= end; i++) {
    t.tcreds += i * 30;
    if (i === 20) { t.kalkonyx += 3; t.cast_die += 5;    t.tcreds += 5000;  }
    if (i === 40) { t.auronyx  += 5; t.heavy_cast += 15; t.tcreds += 10000; }
    if (i === 60) { t.umbronyx += 5; t.d96_steel  += 16; t.tcreds += 15000; }
    if (i === 80) { t.wulingstone += 8; t.d96_steel += 20; t.tcreds += 20000; }
    if (i > 1  && i <= 20 && i % 2 === 0) t.cast_die  += 1;
    if (i > 20 && i <= 40 && i % 2 === 0) t.cast_die  += 1;
    if (i > 40 && i <= 60 && i % 2 === 0) t.heavy_cast += 2;
    if (i > 60 && i <= 80 && i % 2 === 0) t.heavy_cast += 2;
  }

  const grid = document.getElementById('matGrid');
  grid.innerHTML = '';
  for (const [k, v] of Object.entries(t)) {
    if (v <= 0) continue;
    const m = MAT_DB[k];
    grid.innerHTML += `<div class="mat-card ${m.css}">
      <div class="mat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${m.icon}</svg></div>
      <div class="mat-name">${m.name}</div>
      <div class="mat-qty">${v.toLocaleString()}</div>
    </div>`;
  }
}

document.getElementById('trackStart').addEventListener('input', updateTrackMats);
document.getElementById('trackEnd').addEventListener('input', updateTrackMats);

/* =========================================================
   INIT
   ========================================================= */
async function init() {
  await Promise.all([fetchWeapons(), fetchAllWeaponSkills()]);
  populateSelector();
  document.getElementById('loadingOverlay').classList.add('hide');
  if (WEAPONS.length > 0) {
    const defaultId = WEAPONS.find(w => w.id === 'forgeborn-scathe')?.id || WEAPONS[0].id;
    await loadWeapon(defaultId);
  }
}

init();
