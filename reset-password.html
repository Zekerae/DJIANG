<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJIANG — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #07080b; --teal: #00e5c0; --purple: #6b4fa0;
    --border: rgba(255,255,255,0.08); --border2: rgba(0,229,192,0.25);
    --text: #e4e0d8; --dim: #5a5868; --dim2: #8a8694;
    --error: #e05a5a; --success: #6ddc9a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    pointer-events: none; z-index: 1;
  }
  /* Background orbs */
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none;
    animation: orb-float 8s ease-in-out infinite alternate;
  }
  .bg-orb-1 { width: 400px; height: 400px; background: rgba(42,122,85,0.12); top: -100px; left: -100px; }
  .bg-orb-2 { width: 300px; height: 300px; background: rgba(107,79,160,0.15); bottom: -50px; right: -50px; animation-delay: -4s; }
  @keyframes orb-float { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }

  .wrapper { position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 24px; }

  .auth-logo { text-align: center; margin-bottom: 32px; }
  .logo-mark {
    display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: 14px; letter-spacing: 6px; color: var(--teal);
    border: 1px solid var(--border2); padding: 6px 18px; border-radius: 2px; margin-bottom: 10px;
  }
  .logo-sub { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim2); }

  .card {
    background: rgba(12,13,18,0.95); border: 1px solid var(--border); border-radius: 4px;
    padding: 36px 30px; position: relative; backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,229,192,0.05);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent); opacity: 0.5;
  }

  .panel-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 3px; text-transform: uppercase; color: #fff; margin-bottom: 6px; }
  .panel-sub { font-size: 13px; color: var(--dim2); line-height: 1.6; margin-bottom: 28px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim2); margin-bottom: 8px; }
  .field input {
    width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 3px;
    padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: all 0.2s; outline: none;
  }
  .field input:focus { border-color: rgba(0,229,192,0.4); background: rgba(0,0,0,0.6); box-shadow: 0 0 0 3px rgba(0,229,192,0.06); }
  .field input.error-field { border-color: rgba(224,90,90,0.5); }

  .pw-strength { display: flex; gap: 3px; margin-top: 8px; }
  .pw-bar { flex: 1; height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; transition: background 0.3s; }
  .pw-bar.weak { background: #e05a5a; } .pw-bar.fair { background: #e0a05a; } .pw-bar.strong { background: var(--success); }
  .pw-label { font-size: 10px; color: var(--dim); margin-top: 5px; letter-spacing: 1px; }

  .auth-alert { padding: 12px 16px; border-radius: 3px; font-size: 13px; margin-bottom: 20px; display: none; letter-spacing: 0.3px; line-height: 1.5; }
  .auth-alert.visible { display: block; }
  .auth-alert.error { background: rgba(224,90,90,0.12); border: 1px solid rgba(224,90,90,0.3); color: #f4a0a0; }
  .auth-alert.success { background: rgba(109,220,154,0.1); border: 1px solid rgba(109,220,154,0.3); color: var(--success); }

  .btn-primary {
    width: 100%; padding: 14px; background: transparent; border: 1px solid var(--teal); border-radius: 3px;
    color: var(--teal); font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .btn-primary::before { content: ''; position: absolute; inset: 0; background: var(--teal); transform: translateX(-101%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); z-index: 0; }
  .btn-primary:hover::before { transform: translateX(0); } .btn-primary:hover { color: #000; }
  .btn-primary span { position: relative; z-index: 1; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .auth-footer-note { text-align: center; margin-top: 20px; font-size: 11px; color: var(--dim); }
  .auth-footer-note a { color: var(--dim2); text-decoration: none; transition: color 0.2s; }
  .auth-footer-note a:hover { color: var(--teal); }

  /* Loading state */
  .loading-state { text-align: center; padding: 20px 0; }
  .loading-state .spinner { width: 24px; height: 24px; border-width: 3px; border-top-color: var(--teal); }
  .loading-state p { margin-top: 12px; color: var(--dim2); font-size: 13px; }
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="wrapper">
  <div class="auth-logo">
    <div class="logo-mark">DJIANG</div>
    <div class="logo-sub">Arknights: Endfield Companion</div>
  </div>

  <div class="card">
    <!-- Loading state while checking URL hash -->
    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <p>Verifying reset link...</p>
    </div>

    <!-- Reset form -->
    <div id="reset-form" style="display:none">
      <div class="panel-title">New Password</div>
      <div class="panel-sub">Choose a strong new password for your DJIANG account.</div>

      <div class="auth-alert" id="reset-alert"></div>

      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" oninput="checkPwStrength(this.value)">
        <div class="pw-strength">
          <div class="pw-bar" id="r-pw-bar-1"></div>
          <div class="pw-bar" id="r-pw-bar-2"></div>
          <div class="pw-bar" id="r-pw-bar-3"></div>
          <div class="pw-bar" id="r-pw-bar-4"></div>
        </div>
        <div class="pw-label" id="r-pw-label">Enter a new password</div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter') doReset()">
      </div>

      <button class="btn-primary" id="reset-btn" onclick="doReset()">
        <span id="reset-btn-text">Update Password</span>
      </button>
    </div>

    <!-- Invalid link -->
    <div id="invalid-link" style="display:none">
      <div class="panel-title">Link Expired</div>
      <div class="panel-sub">This password reset link is invalid or has expired. Please request a new one.</div>
      <a href="auth.html" style="display:block">
        <button class="btn-primary"><span>Back to Sign In</span></button>
      </a>
    </div>
  </div>

  <div class="auth-footer-note">
    <a href="index.html">← Return to DJIANG</a>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://vjcucliqjjljhgbqshmi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqY3VjbGlxampsamhnYnFzaG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTU3MTIsImV4cCI6MjA5NDA3MTcxMn0.qq7tRmLpRjTv0y4dZxCjcEQ48rTiY5ZV1xunr32kh10';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showAlert(type, msg) {
  const el = document.getElementById('reset-alert');
  el.className = `auth-alert visible ${type}`;
  el.textContent = msg;
}

function checkPwStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const bars = ['r-pw-bar-1','r-pw-bar-2','r-pw-bar-3','r-pw-bar-4'];
  const classes = ['','weak','fair','strong','strong'];
  bars.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'pw-bar';
    if (i < score) el.classList.add(classes[score]);
  });
  const lbl = document.getElementById('r-pw-label');
  const labels = ['','Weak','Fair','Strong','Very Strong'];
  lbl.textContent = pw.length === 0 ? 'Enter a new password' : (labels[score] || 'Weak');
  lbl.style.color = score >= 3 ? 'var(--success)' : score === 2 ? '#e0a05a' : score === 1 ? 'var(--error)' : 'var(--dim)';
}

async function doReset() {
  const pw1 = document.getElementById('new-password').value;
  const pw2 = document.getElementById('confirm-password').value;

  if (!pw1 || pw1.length < 6) { showAlert('error', 'Password must be at least 6 characters.'); return; }
  if (pw1 !== pw2)             { showAlert('error', 'Passwords do not match.'); return; }

  const btn = document.getElementById('reset-btn');
  const txt = document.getElementById('reset-btn-text');
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span> Updating...';

  const { error } = await db.auth.updateUser({ password: pw1 });

  btn.disabled = false;
  txt.textContent = 'Update Password';

  if (error) {
    showAlert('error', error.message || 'Failed to update password.');
    return;
  }

  showAlert('success', 'Password updated! Redirecting to sign in...');
  setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
}

// ── CHECK FOR VALID RESET SESSION ────────────────────────────────
(async () => {
  // Supabase sends the token in the URL hash after redirect
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#',''));
  const accessToken = params.get('access_token');
  const type = params.get('type');

  if (accessToken && type === 'recovery') {
    // Set the session from the token
    const { error } = await db.auth.setSession({
      access_token: accessToken,
      refresh_token: params.get('refresh_token') || ''
    });

    document.getElementById('loading-state').style.display = 'none';

    if (error) {
      document.getElementById('invalid-link').style.display = 'block';
    } else {
      document.getElementById('reset-form').style.display = 'block';
    }
  } else {
    // Check if there's an existing recovery session
    const { data: { session } } = await db.auth.getSession();
    document.getElementById('loading-state').style.display = 'none';

    if (session) {
      document.getElementById('reset-form').style.display = 'block';
    } else {
      document.getElementById('invalid-link').style.display = 'block';
    }
  }
})();
</script>
</body>
</html>
