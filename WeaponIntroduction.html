<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Weapon — Arknights: Endfield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'diamante-serial-bold';
  src: url('https://static.wfonts.com/data/2016/01/11/diamante-serial/diamante-serial-bold.ttf') format('truetype');
  font-display: swap;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:   #07080b;
  --bg2:  #0c0d12;
  --bg3:  #10121a;
  --bord: rgba(255,255,255,.055);
  --bord2:rgba(255,255,255,.10);
  --text: #e4e0d8;
  --dim:  #5a5868;
  --dim2: #8a8694;
  --gold: #d4943a;
  --gold2:#f0b866;
  --accent:     #d4943a;
  --accent-dim: rgba(212,148,58,.18);
  --accent-glow:rgba(212,148,58,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html { height: 100%; }
body {
  min-height: 100%;
  overflow-x: hidden;
}
body{font-family:'diamante-serial-bold','DM Sans',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.022) 3px,rgba(0,0,0,.022) 4px);}

/* ── TOP BAR ── */
.topbar{
  position:relative;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:56px;
  background:rgba(7,8,11,.95);border-bottom:1px solid var(--bord);
  backdrop-filter:blur(16px);
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;}
.logo-mark{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,var(--gold),#a0601a);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:#fff;flex-shrink:0;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);white-space:nowrap;}
.breadcrumb a{color:var(--dim2);text-decoration:none;}
.breadcrumb a:hover{color:var(--text);}
.breadcrumb .sep{opacity:.4;}
.breadcrumb .cur{color:var(--text);}

/* ── TOPBAR RIGHT ── */
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* save badge */
.save-badge{display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid transparent;transition:.3s;opacity:0;}
.save-badge.show{opacity:1;}
.save-badge.saving{color:var(--gold2);border-color:rgba(240,184,102,.3);background:rgba(240,184,102,.07);}
.save-badge.saved{color:#6ddc9a;border-color:rgba(109,220,154,.3);background:rgba(109,220,154,.07);}
.save-badge.error{color:#ff6b6b;border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.07);}

/* ── HELP BUTTON ── */
.help-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid var(--bord2);
  color:var(--dim2);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;flex-shrink:0;
  user-select:none;
}
.help-btn:hover{background:rgba(212,148,58,.18);border-color:var(--gold);color:var(--gold2);}

/* ── GUIDED TOUR OVERLAY ── */
.tour-overlay{
  position:fixed;inset:0;z-index:9000;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.tour-overlay.active{opacity:1;pointer-events:auto;}

/* dark mask with cutout */
.tour-mask{
  position:absolute;inset:0;
  background:rgba(4,3,10,.82);
  transition:all .35s cubic-bezier(.4,0,.2,1);
}

/* spotlight hole — drawn via box-shadow trick */
.tour-spotlight{
  position:absolute;
  border-radius:8px;
  box-shadow:0 0 0 9999px rgba(4,3,10,.82);
  border:2px solid var(--gold);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
  z-index:9001;
}

/* tour card */
.tour-card{
  position:absolute;
  width:300px;
  background:linear-gradient(145deg,#16121e,#0e0b16);
  border:1px solid rgba(212,148,58,.35);
  border-radius:10px;
  padding:18px 20px 14px;
  box-shadow:0 16px 40px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
  z-index:9002;
  transition:all .35s cubic-bezier(.4,0,.2,1);
}
.tour-step-label{
  font-family:'Rajdhani',sans-serif;font-size:.55rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.tour-step-dots{display:flex;gap:4px;margin-left:auto;}
.tour-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);}
.tour-dot.active{background:var(--gold);}
.tour-title{
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;
  color:#fff;margin-bottom:7px;line-height:1.1;
}
.tour-desc{
  font-size:.73rem;color:var(--dim2);line-height:1.65;margin-bottom:14px;
}
.tour-desc b{color:var(--gold2);font-weight:600;}
.tour-actions{display:flex;align-items:center;justify-content:space-between;}
.tour-skip{
  font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--dim);cursor:pointer;transition:.2s;
  background:transparent;border:none;
}
.tour-skip:hover{color:#e05a5a;}
.tour-nav{display:flex;gap:8px;}
.tour-btn{
  font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:6px 14px;border-radius:4px;cursor:pointer;transition:.2s;
  border:1px solid var(--bord2);background:rgba(255,255,255,.05);color:var(--dim2);
}
.tour-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
.tour-btn.primary{background:var(--accent-dim);border-color:var(--gold);color:var(--gold2);}
.tour-btn.primary:hover{background:rgba(212,148,58,.3);}

/* ── CUSTOM WEAPON DROPDOWN ── */
.wpn-dropdown-wrap{position:relative;}

.wpn-trigger{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.04);border:1px solid var(--bord2);border-radius:6px;
  padding:6px 10px 6px 12px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:.2s;white-space:nowrap;min-width:240px;max-width:320px;
  user-select:none;
}
.wpn-trigger:hover{background:rgba(255,255,255,.07);border-color:var(--gold);}
.wpn-trigger.open{border-color:var(--gold);background:rgba(255,255,255,.07);}
.wpn-trigger-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wpn-trigger-arrow{flex-shrink:0;color:var(--dim2);font-size:0.6rem;transition:transform .2s;}
.wpn-trigger.open .wpn-trigger-arrow{transform:rotate(180deg);}

.wpn-filter-badge{
  flex-shrink:0;background:var(--accent);color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:.55rem;font-weight:700;letter-spacing:.5px;
  padding:2px 6px;border-radius:10px;
  display:none;
}
.wpn-filter-badge.visible{display:block;}

.wpn-panel{
  position:absolute;top:calc(100% + 6px);left:0;
  width:420px;
  background:rgba(10,11,18,.98);border:1px solid var(--bord2);border-radius:8px;
  box-shadow:0 20px 50px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  z-index:9999;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
.wpn-panel.open{display:flex;}

.wpn-panel-search{
  padding:10px 10px 8px;
  border-bottom:1px solid var(--bord);
  flex-shrink:0;
}
.wpn-search-input{
  width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bord2);border-radius:5px;
  padding:7px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.8rem;
  outline:none;transition:.2s;
}
.wpn-search-input:focus{border-color:var(--gold);background:rgba(255,255,255,.08);}
.wpn-search-input::placeholder{color:var(--dim);}

.wpn-panel-filters{
  padding:8px 10px;border-bottom:1px solid var(--bord);
  display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;
}
.wpn-filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.wpn-filter-group-label{font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);flex-shrink:0;width:44px;}
.fpill{
  padding:3px 9px;border-radius:4px;border:1px solid var(--bord2);
  font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim2);background:transparent;cursor:pointer;transition:.18s;
}
.fpill:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.fpill.active-r6{background:rgba(212,148,58,.18);color:var(--gold2);border-color:rgba(212,148,58,.5);}
.fpill.active-r5{background:rgba(195,106,42,.18);color:#e8956a;border-color:rgba(195,106,42,.5);}
.fpill.active-r4{background:rgba(124,111,232,.18);color:#b0a0ff;border-color:rgba(124,111,232,.5);}
.fpill.active-r3{background:rgba(100,160,100,.15);color:#90c890;border-color:rgba(100,160,100,.4);}
.fpill.active-Sword     {background:rgba(224,90,43,.15);color:#ff8a65;border-color:rgba(224,90,43,.4);}
.fpill.active-Greatsword{background:rgba(212,148,58,.15);color:var(--gold2);border-color:rgba(212,148,58,.4);}
.fpill.active-Polearm   {background:rgba(42,140,82,.15);color:#6ddc9a;border-color:rgba(42,140,82,.4);}
.fpill.active-Handcannon{background:rgba(59,130,246,.15);color:#7ab8ff;border-color:rgba(59,130,246,.4);}
.fpill.active-ArtsUnit  {background:rgba(168,85,247,.15);color:#c89eff;border-color:rgba(168,85,247,.4);}
.filter-clear-small{margin-left:auto;padding:3px 8px;border:1px solid var(--bord);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);background:transparent;cursor:pointer;transition:.18s;flex-shrink:0;}
.filter-clear-small:hover{color:#e05a5a;border-color:rgba(224,90,90,.4);background:rgba(224,90,90,.08);}

.wpn-list{
  overflow-y:auto;
  max-height:320px;
  flex:1;
}
.wpn-list::-webkit-scrollbar{width:4px;}
.wpn-list::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px;}

.wpn-optgroup-label{
  padding:8px 12px 4px;
  font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);
  position:sticky;top:0;
  background:rgba(10,11,18,.98);
  border-bottom:1px solid var(--bord);
  z-index:2;
}
.wpn-option{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;transition:.15s;
  border-bottom:1px solid rgba(255,255,255,.025);
}
.wpn-option:hover{background:rgba(255,255,255,.05);}
.wpn-option.selected{background:var(--accent-dim);}
.wpn-option-stars{display:flex;gap:2px;flex-shrink:0;}
.wpn-option-star{width:7px;height:7px;transform:rotate(45deg);border-radius:1px;background:var(--gold2);}
.wpn-option-name{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.5px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wpn-option-type{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim2);flex-shrink:0;}
.wpn-no-results{padding:20px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}

/* ── OUTER SHELL ── */
.shell{
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100svh;
  overflow:hidden;
}

/* ── LAYOUT ── */
.layout{
  position:relative;z-index:1;
  display:flex;
  flex:1;
  min-height:0;
  overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar{width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:28px 0;background:var(--bg2);border-right:1px solid var(--bord);}
.sb-btn{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:.2s;color:var(--dim);background:transparent;position:relative;}
.sb-btn:hover{color:var(--text);background:rgba(255,255,255,.05);border-color:var(--bord2);}
.sb-btn.active{color:var(--accent);background:var(--accent-dim);border-color:var(--accent);}
.sb-btn svg{width:18px;height:18px;}
.sb-tip{position:absolute;left:calc(100% + 10px);background:var(--bg3);border:1px solid var(--bord2);border-radius:4px;padding:5px 10px;font-family:'Rajdhani',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text);white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;z-index:99;}
.sb-btn:hover .sb-tip{opacity:1;}

/* ── CARD STAGE ── */
.card-stage{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  perspective:1400px;
  position:relative;
  padding:40px 20px;
  overflow:hidden;
}
.stage-glow{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 60% at 50% 50%, var(--accent-glow), transparent 70%);transition:background .6s ease;}

@keyframes floatIdle {
  0%   { transform: rotateY(-6deg) rotateX(4deg) translateY(0px); }
  50%  { transform: rotateY(6deg)  rotateX(2deg) translateY(-8px); }
  100% { transform: rotateY(-6deg) rotateX(4deg) translateY(0px); }
}
@keyframes floatSpin {
  0%   { transform: rotateY(0deg)   rotateX(5deg) translateY(0); }
  25%  { transform: rotateY(90deg)  rotateX(2deg) translateY(-8px); }
  50%  { transform: rotateY(180deg) rotateX(5deg) translateY(0); }
  75%  { transform: rotateY(270deg) rotateX(2deg) translateY(-8px); }
  100% { transform: rotateY(360deg) rotateX(5deg) translateY(0); }
}
.card-3d-wrap {
  width: 300px; height: 450px;
  transform-style: preserve-3d;
  animation: floatIdle 4s ease-in-out infinite;
  position: relative; z-index: 1;
  cursor: grab;
}
.card-3d-wrap:hover { animation: floatSpin 12s ease-in-out infinite; }
.card-3d-wrap:active { cursor: grabbing; }

.card-face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;overflow:hidden;}
.card-front{transform:translateZ(6px);}
.card-back{transform:rotateY(180deg) translateZ(6px);}
.card-art-bg{position:absolute;inset:0;background:var(--card-bg,linear-gradient(155deg,#261a06 0%,#120c01 100%));transition:background .5s;}
.card-art-img{
  transform-style:preserve-3d;position:absolute;
  width:95%;height:95%;object-fit:contain;object-position:center center;
  display:block;top:50%;left:50%;
  transform:translate(-50%,-52%) translateZ(0);
  will-change:auto;image-rendering:auto;transition:opacity .4s;
}
.card-letter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:9rem;color:var(--accent);opacity:.20;z-index:-1;transition:color .5s;}
.rarity-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;z-index:5;border-radius:14px 0 0 14px;background:linear-gradient(180deg,var(--stripe-top,#ffe06a),var(--stripe-bot,#c9902a));transition:background .5s;}
.card-border-frame{position:absolute;inset:10px;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;z-index:4;pointer-events:none;box-shadow:inset 0 0 20px rgba(0,0,0,.4);}
.glass-overlay{position:absolute;inset:0;z-index:6;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.02) 35%,transparent 60%,rgba(255,255,255,.04) 100%);border:1.5px solid rgba(255,255,255,.22);border-radius:14px;}
.glass-shine{position:absolute;top:0;left:0;width:45%;height:100%;background:linear-gradient(110deg,rgba(255,255,255,.09) 0%,transparent 70%);pointer-events:none;z-index:7;border-radius:14px 0 0 14px;}
.glass-edge{position:absolute;inset:0;border-radius:14px;pointer-events:none;z-index:8;box-shadow:inset 0 1.5px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(255,255,255,.08),inset 1.5px 0 0 rgba(255,255,255,.22),inset -1px 0 0 rgba(255,255,255,.04),0 0 60px var(--accent-glow),0 0 120px rgba(0,0,0,.3);transition:box-shadow .5s;}
.card-type-badge{position:absolute;top:0;right:0;z-index:9;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;border-radius:0 14px 0 8px;background:var(--accent);color:#fff;opacity:.9;}
.card-bottom{position:absolute;bottom:0;left:0;right:0;z-index:9;padding:50px 14px 14px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.95) 60%);}
.card-wpn-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,1);margin-bottom:6px;}
.card-stars-row{display:flex;gap:3px;}
.card-star{width:10px;height:10px;transform:rotate(45deg);border-radius:1px;background:var(--gold2);opacity:.85;}
.card-level-badge{position:absolute;top:14px;left:14px;z-index:10;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--gold2);background:rgba(0,0,0,.6);border:1px solid rgba(240,184,102,.3);border-radius:4px;padding:2px 8px;backdrop-filter:blur(4px);}
.card-back-content{position:absolute;inset:0;background:linear-gradient(155deg,#0a0810,#050308);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.back-pattern{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(45deg,var(--accent) 0,var(--accent) 1px,transparent 0,transparent 50%);background-size:16px 16px;}
.back-logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:6px;color:var(--accent);opacity:.6;z-index:1;}
.back-sub{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--dim);z-index:1;}

/* ── RIGHT PANEL ── */
.right-panel{
  width:400px;flex-shrink:0;
  background:var(--bg2);border-left:1px solid var(--bord);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
.right-panel::-webkit-scrollbar{width:4px;}
.right-panel::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px;}

.panel-head{padding:28px 28px 20px;border-bottom:1px solid var(--bord);position:sticky;top:0;background:var(--bg2);z-index:10;}
.wpn-type-label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.wpn-type-label::before{content:'';width:20px;height:1px;background:var(--accent);opacity:.7;}
.wpn-name{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#fff;line-height:1.05;margin-bottom:10px;}
.wpn-stars{display:flex;gap:5px;margin-bottom:6px;}
.wpn-star{width:13px;height:13px;transform:rotate(45deg);border-radius:1px;background:var(--gold2);box-shadow:0 0 6px var(--gold);}
.panel-body{padding:20px 28px;display:flex;flex-direction:column;gap:20px;}

.level-block{display:flex;flex-direction:column;gap:10px;}
.level-header{display:flex;align-items:center;justify-content:space-between;}
.level-label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);}
.level-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--accent);}

   RESPONSIVE — full coverage
   Breakpoints:
     xs  : ≤ 480px   (phones portrait)
     sm  : 481–768px (phones landscape / small tablet)
     md  : 769–960px (tablet portrait / small laptop)
     lg  : 961–1200px (tablet landscape / laptop)

   ═══════════════════════════════════════════════════ */

/* ── LARGE TABLET (≤ 1200px) ── */
@media(max-width:1200px){
  .right-panel{ width:360px; }
}

/* ── MEDIUM / TABLET PORTRAIT (≤ 960px) ── */
@media(max-width:960px){

  .wpn-name{ font-size:1.9rem; }
}

/* ── SMALL TABLET / LARGE PHONE LANDSCAPE (≤ 768px) ── */
@media(max-width:768px){
  /* allow page to scroll vertically */
  html, body { height:auto; overflow-x:hidden; overflow-y:auto; }
  .shell{ height:auto; min-height:100svh; overflow:visible; }

  /* stack layout vertically */
  .layout{ flex-direction:column; overflow:visible; }

  /* topbar: compact */
  .topbar{ padding:0 12px; height:52px; }
  .breadcrumb{ font-size:.65rem; letter-spacing:1.5px; }
  .breadcrumb .cur{ max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .save-badge{ display:none; }

  /* weapon selector: shrink trigger */
  .wpn-trigger{ min-width:0; max-width:180px; font-size:.72rem; padding:5px 8px 5px 10px; }

  /* panel: full-width from top bar */
  .wpn-panel{
    width:calc(100vw - 16px);

    max-height:60vh;
  }

  .sidebar{
    flex-direction:row; width:100%; height:48px;
    padding:0 16px; gap:8px;
    border-right:none; border-bottom:1px solid var(--bord);

  /* card stage: shrink, don't flex-grow to fill half the screen */
  .card-stage{
    flex:none; padding:24px 16px 20px;
    min-height:280px; height:auto;
  }
  .card-3d-wrap{ width:200px; height:300px; }

  /* right panel: full width, scrolls naturally */
  .right-panel{
    width:100%; flex:none;
    border-left:none; border-top:1px solid var(--bord);
    overflow-y:visible; max-height:none;
  }
  .panel-head{ padding:18px 16px 14px; position:relative; top:auto; }
  .panel-body{ padding:14px 16px; gap:16px; }
  .wpn-name{ font-size:1.7rem; }

  /* modal: full width */
  .modal-box{ padding:20px 16px; }
  .mat-grid{ grid-template-columns:repeat(3,1fr); gap:8px; }

  /* tour card: responsive width */
  .tour-card{ width:calc(100vw - 32px); max-width:320px; }
}

@media(max-width:480px){

  .topbar{ padding:0 10px; gap:8px; }
  .logo-mark{ width:28px; height:28px; font-size:12px; }

}

function endTour() {

function tourStep(delta) {
  tourStepIdx = Math.max(0, Math.min(TOUR_STEPS.length - 1, tourStepIdx + delta));

}

function renderTourStep(idx) {
  const step   = TOUR_STEPS[idx];
  const total  = TOUR_STEPS.length;
  const target = document.getElementById(step.targetId);

  // dots
  let dots = '';
  for (let i = 0; i < total; i++) dots += `<div class="tour-dot${i===idx?' active':''}"></div>`;
  document.getElementById('tourDots').innerHTML = dots;
  document.getElementById('tourStepNum').textContent = `Step ${idx+1} of ${total}`;
  document.getElementById('tourTitle').textContent  = step.title;
  document.getElementById('tourDesc').innerHTML     = step.desc;

  // prev/next buttons
  const prev = document.getElementById('tourPrev');
  const next = document.getElementById('tourNext');
  prev.style.display = idx === 0 ? 'none' : '';
  next.textContent   = idx === total - 1 ? 'Finish ✓' : 'Next →';
  next.onclick       = idx === total - 1 ? endTour : () => tourStep(1);

  if (!target) return;

  // position spotlight
  const rect   = target.getBoundingClientRect();
  const pad    = step.pad || 8;
  const sp     = document.getElementById('tourSpotlight');
  sp.style.top    = (rect.top    - pad) + 'px';
  sp.style.left   = (rect.left   - pad) + 'px';
  sp.style.width  = (rect.width  + pad*2) + 'px';
  sp.style.height = (rect.height + pad*2) + 'px';

  // position card
  const card = document.getElementById('tourCard');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isMobile = vw <= 600;
  const cardW = isMobile ? vw - 24 : 300;
  const cardH = 200;

  if (isMobile) {
    // always pin to bottom on mobile
    card.style.left   = '12px';
    card.style.right  = '12px';
    card.style.width  = '';
    card.style.bottom = '16px';
    card.style.top    = 'auto';
    return;
  }

  card.style.bottom = '';
  card.style.right  = '';
  card.style.width  = '';

  let cx, cy;
  const pos = step.cardPos || 'below-left';
  if (pos === 'below-left') {
    cx = Math.min(rect.right - cardW, vw - cardW - 16);
    cy = rect.bottom + pad + 12;
  } else if (pos === 'below-right') {
    cx = rect.left;
    cy = rect.bottom + pad + 12;
  } else if (pos === 'right') {
    cx = rect.right + pad + 16;
    cy = rect.top + rect.height/2 - cardH/2;
  } else if (pos === 'left') {
    cx = rect.left - cardW - pad - 16;
    cy = rect.top + rect.height/2 - cardH/2;
  }

  cx = Math.max(12, Math.min(vw - cardW - 12, cx));
  cy = Math.max(12, Math.min(vh - cardH - 12, cy));

  card.style.left = cx + 'px';
  card.style.top  = cy + 'px';
}

// Thin SDK wrappers that mirror the old sbGet/sbUpsert signatures
async function sbGet(table, params = '') {
  const url = new URL('http://x?' + params);
  const select = url.searchParams.get('select') || '*';
  let q = db.from(table).select(select);
  url.searchParams.forEach((val, key) => {
    if (key === 'select' || key === 'order') return;
    const m = key.match(/^(.+)\.(eq|neq|gt|lt|gte|lte|in)$/);
    if (m) q = q[m[2]](m[1], val);
  });
  const orderParam = url.searchParams.get('order');
  if (orderParam) {
    orderParam.split(',').forEach(o => {
      const [col, dir] = o.split('.');
      q = q.order(col, { ascending: dir !== 'desc' });
    });
  }
  const { data, error } = await q;
  if (error) throw new Error(error.message);
  return data || [];
}

async function sbUpsert(table, body) {
  const { error } = await db.from(table).upsert(body, { onConflict: 'user_id,weapon_id' });
  if (error) throw new Error(error.message);
}

function parseStatString(s) {
  if (!s || s === '—') return null;
  const patterns = [
    { re:/^Attack \+([0-9.]+)%/,              key:'atk_pct',   pct:true  },
    { re:/^Critical Rate \+([0-9.]+)%/,       key:'crit_rate', pct:true  },
    { re:/^Physical DMG Bonus \+([0-9.]+)%/,  key:'phys_dmg',  pct:true  },
    { re:/^Arts DMG Bonus \+([0-9.]+)%/,      key:'arts_dmg',  pct:true  },
    { re:/^Heat DMG Bonus \+([0-9.]+)%/,      key:'heat_dmg',  pct:true  },
    { re:/^Cryo DMG (?:Dealt|Bonus) \+([0-9.]+)%/, key:'cryo_dmg', pct:true },
    { re:/^Electric DMG Bonus \+([0-9.]+)%/,  key:'elec_dmg',  pct:true  },
    { re:/^Nature DMG Bonus \+([0-9.]+)%/,    key:'nat_dmg',   pct:true  },
    { re:/^Treatment Bonus \+([0-9.]+)%/,     key:'treat_bon', pct:true  },
    { re:/^Max HP \+([0-9.]+)%/,              key:'max_hp',    pct:true  },
    { re:/^Ultimate Gain Eff\. \+([0-9.]+)%/, key:'ult_gain',  pct:true  },
    { re:/^Ultimate Gain Efficiency \+([0-9.]+)%/, key:'ult_gain', pct:true },
    { re:/^Arts Intensity \+([0-9]+)/,         key:'arts_int',  pct:false },
    { re:/^Will(?:power)? \+([0-9]+)/,         key:'will',      pct:false },
    { re:/^Intellect \+([0-9]+)/,              key:'intellect', pct:false },
    { re:/^Agility \+([0-9]+)/,               key:'agility',   pct:false },
    { re:/^Strength \+([0-9]+)/,              key:'strength',  pct:false },
    { re:/^Main Attribute \+([0-9]+)/,         key:'main_attr', pct:false },
  ];
  for (const p of patterns) {
    const m = s.match(p.re);
    if (m) return { key: p.key, maxVal: parseFloat(m[1]), isPct: p.pct };
  }
  return { key: null, maxVal: null, raw: s };
}

function scaledSubstat(parsed, level, maxLv) {
  if (!parsed || !parsed.key) return parsed?.raw ?? '—';
  const cfg = SUBSTAT_SCALE[parsed.key];
  if (!cfg) return parsed.raw ?? '—';
  const t   = (level - 1) / (maxLv - 1);
  const val = parsed.maxVal * (cfg.min + (1 - cfg.min) * t);
  return cfg.label(val);
}

function resolveRenderFn(skillId, skillName, data) {
  if (SKILL_RENDERS[skillId]) return SKILL_RENDERS[skillId];
  // Fallback by name keywords for any unmapped ids
  const n = (skillName || '').toLowerCase();
  if (n.includes('attack') || n.includes('atk'))    return (v) => 'Attack '         + hi(fmtPct(v) + '%');
  if (n.includes('intellect'))                       return (v) => 'Intellect '      + hi(fmtNum(v));
  if (n.includes('agility'))                         return (v) => 'Agility '        + hi(fmtNum(v));
  if (n.includes('strength'))                        return (v) => 'Strength '       + hi(fmtNum(v));
  if (n.includes('willpower') || n.includes('will')) return (v) => 'Willpower '      + hi(fmtNum(v));
  if (n.includes('arts intensity'))                  return (v) => 'Arts Intensity ' + hi(fmtNum(v));
  if (n.includes('arts dmg'))                        return (v) => 'Arts DMG '       + hi(fmtPct(v) + '%');
  if (n.includes('phys') || n.includes('physical'))  return (v) => 'Physical DMG '   + hi(fmtPct(v) + '%');
  if (n.includes('heat'))                            return (v) => 'Heat DMG '       + hi(fmtPct(v) + '%');
  if (n.includes('cryo'))                            return (v) => 'Cryo DMG '       + hi(fmtPct(v) + '%');
  if (n.includes('elec'))                            return (v) => 'Electric DMG '   + hi(fmtPct(v) + '%');
  if (n.includes('nature'))                          return (v) => 'Nature DMG '     + hi(fmtPct(v) + '%');
  if (n.includes('treatment') || n.includes('te'))   return (v) => 'Treatment Bonus '+ hi(fmtPct(v) + '%');
  if (n.includes('hp') || n.includes('max hp'))      return (v) => 'Max HP '         + hi(fmtPct(v) + '%');
  if (n.includes('ult') || n.includes('uge'))        return (v) => 'Ult. Gain Eff. ' + hi(fmtPct(v) + '%');
  if (n.includes('crit'))                            return (v) => 'Critical Rate '  + hi(fmtPct(v) + '%');
  if (n.includes('main attr'))                       return (v) => 'Main Attribute ' + hi(fmtNum(v));
  // Effect skills (skill_index 2) — object values, not rendered via this path
  return (v) => typeof v === 'number' ? hi(fmtNum(v)) : hi(v);
}

async function fetchAllAtkCurves() {
  // Seed from embedded static data first so ATK is always correct
  DB_ATK_CURVES = {};
  for (const [wid, pts] of Object.entries(STATIC_ATK_CURVES)) {
    DB_ATK_CURVES[wid] = pts.slice(); // copy
  }
  // Merge any additional rows from Supabase (new weapons, corrections)
  try {
    const rows = await sbGet('weapon_atk_curve', 'select=weapon_id,lv,atk&order=weapon_id.asc,lv.asc');
    for (const row of rows) {
      if (!DB_ATK_CURVES[row.weapon_id]) DB_ATK_CURVES[row.weapon_id] = [];
      // Only add if this breakpoint isn't already covered by the static data
      const existing = DB_ATK_CURVES[row.weapon_id];
      if (!existing.find(p => p.lv === row.lv)) {
        existing.push({ lv: row.lv, atk: row.atk });
        existing.sort((a, b) => a.lv - b.lv);
      }
    }
  } catch(e) {
    console.warn('[AtkCurves] Supabase fetch skipped, using static data:', e.message);
  }
}

// Interpolate ATK at any level using the piecewise breakpoints from weapon_atk_curve.
// Falls back to lerp against base_atk if curve data isn't available.
function getAtkAtLevel(weapon, level) {
  const curve = DB_ATK_CURVES[weapon.id];
  if (curve && curve.length >= 2) {
    // Find surrounding breakpoints
    for (let i = 0; i < curve.length - 1; i++) {
      const lo = curve[i];
      const hi = curve[i + 1];
      if (level >= lo.lv && level <= hi.lv) {
        const t = (level - lo.lv) / (hi.lv - lo.lv);
        return Math.round(lo.atk + (hi.atk - lo.atk) * t);
      }
    }
    // Clamp to edges
    if (level <= curve[0].lv) return curve[0].atk;
    return curve[curve.length - 1].atk;
  }
  // Fallback: linear interpolation using rarity-based min values
  const atkMin = { 6:48, 5:38, 4:32, 3:27 }[weapon.rarity] || 48;
  const maxLv  = MAX_LEVEL[weapon.rarity] || 90;
  const t      = (level - 1) / (maxLv - 1);
  return Math.round(atkMin + (weapon.base_atk - atkMin) * t);
}

// ── PROGRESS: localStorage-first, Supabase optional ──────────────────────────
const LS_KEY = 'wpn_progress_v1';

function lsGetAll() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}
function lsSave(weaponId, data) {
  try {
    const all = lsGetAll();
    all[weaponId] = { ...data, updated: Date.now() };
    localStorage.setItem(LS_KEY, JSON.stringify(all));
  } catch(e) { console.warn('localStorage save failed:', e); }
}

async function fetchProgress(weaponId) {
  // 1. Always read from localStorage first (instant, no auth needed)
  const local = lsGetAll()[weaponId] || null;
  if (!currentUser) return local;
  // 2. Try Supabase — filter by the logged-in user
  try {
    const { data, error } = await db.from('weapon_progress')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('weapon_id', weaponId)
      .single();
    if (data && !error) {
      // If remote is newer, use it and refresh local cache
      if (!local || new Date(data.updated_at) > new Date(local.updated || 0)) {
        lsSave(weaponId, { level: data.level, notes: data.notes, tags: data.tags, skill_level: data.skill_level });
        return data;
      }
    }
  } catch { /* RLS / network error — silently use local */ }
  return local;
}

async function saveProgress(weaponId, level, notes, tags, skillLevel) {
  // 1. Always save to localStorage immediately
  lsSave(weaponId, { level, notes, tags, skill_level: skillLevel });
  setSaveBadge('saving');
  if (!currentUser) { setSaveBadge('saved'); return; }
  // 2. Upsert to Supabase with user_id — table PK is (user_id, weapon_id)
  try {
    const { error } = await db.from('weapon_progress').upsert(
      {
        user_id:     currentUser.id,
        weapon_id:   weaponId,
        level,
        notes,
        tags,
        skill_level: skillLevel,
        updated_at:  new Date().toISOString(),
      },
      { onConflict: 'user_id,weapon_id' }
    );
    if (error) throw new Error(error.message);
    setSaveBadge('saved');
  } catch(e) {
    console.error('[Supabase save error]', e.message);
    setSaveBadge('error');
  }
}

function setSaveBadge(state) {
  const el = document.getElementById('saveBadge');
  el.className = `save-badge show ${state}`;
  const labels = { saving:'● Saving…', saved:'● Saved', error:'● Save failed' };
  el.textContent = labels[state] || '';
  if (state === 'saved' || state === 'error') setTimeout(() => { el.className = 'save-badge'; }, 2200);
}

function scheduleSave() {
  clearTimeout(saveTimer);

/* =========================================================
   FILTER LOGIC
   ========================================================= */
function weaponMatchesFilters(w) {
  const q = searchQuery.toLowerCase();
  if (q && !w.name.toLowerCase().includes(q)) return false;
  if (activeFilters.rarity.size && !activeFilters.rarity.has(String(w.rarity))) return false;
  if (activeFilters.type.size   && !activeFilters.type.has(w.type)) return false;
  return true;
}

function updateFilterBadge() {
  const count = activeFilters.rarity.size + activeFilters.type.size;
  const badge = document.getElementById('wpnFilterBadge');
  if (count > 0) { badge.textContent = count; badge.classList.add('visible'); }
  else badge.classList.remove('visible');
}

/* =========================================================
   CUSTOM DROPDOWN
   ========================================================= */
function renderWpnList() {
  const list = document.getElementById('wpnList');
  const groups = { 6:[], 5:[], 4:[], 3:[] };
  WEAPONS.filter(weaponMatchesFilters).forEach(w => groups[w.rarity]?.push(w));
  let html = '';
  let total = 0;
  [6,5,4,3].forEach(r => {
    if (!groups[r].length) return;
    total += groups[r].length;
    html += `<div class="wpn-optgroup-label">${'★'.repeat(r)} · ${r}-Star (${groups[r].length})</div>`;
    groups[r].forEach(w => {
      const sel = curWeapon && curWeapon.id === w.id ? ' selected' : '';
      html += `<div class="wpn-option${sel}" data-id="${w.id}" onclick="selectWeapon('${w.id}')">
        <div class="wpn-option-stars">${Array(r).fill('<div class="wpn-option-star"></div>').join('')}</div>
        <div class="wpn-option-name">${w.name}</div>
        <div class="wpn-option-type">${w.type}</div>
      </div>`;
    });
  });
  if (total === 0) html = '<div class="wpn-no-results">No weapons match</div>';
  list.innerHTML = html;
}

/* =========================================================
   MAIN STATS (skill_index 0 & 1) — scale with skill level 1–9
   EFFECT    (skill_index 2)       — template rendered at skill level
   All three share a single curSkillLevel controlled by one slider
   ========================================================= */

// Render a single scalar stat value (index 0 or 1)
// Delegates to the pre-built render fn (set in fetchAllWeaponSkills) so output
// includes the stat label prefix, e.g. "Intellect +68" or "Attack +17.0%"
function renderStatValue(sk, lv) {
  if (!sk) return '—';
  const val = Array.isArray(sk.data) ? sk.data[lv - 1] : null;
  if (val === null || val === undefined) return '—';
  if (typeof sk.render === 'function') {
    try { return sk.render(val); } catch(e) {}
  }
  // Fallback: detect % stats by name heuristic
  const name = (sk.skill_name || sk.name || '').toLowerCase();
  const isPct = name.includes('rate') || name.includes('bonus') || name.includes('dmg')
    || name.includes('attack') || name.includes('efficiency') || name.includes('hp');
  if (isPct && typeof val === 'number' && !Number.isInteger(val))
    return '<span class="hl-atk">+' + val.toFixed(2) + '%</span>';
  if (isPct && typeof val === 'number')
    return '<span class="hl-atk">+' + val + '%</span>';
  return '<span class="hl">' + (typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(1)) : val) + '</span>';
}

// Render effect description for skill_index 2
// data[lv-1] is an object like {value_1: 25.6, value_2: 120}
// passive_lv9 is the lv9 description text with the lv9 numbers embedded
// Strategy: replace lv9 numeric values in the text with current-level values
function renderEffectDesc(sk, lv, weapon) {
  if (!sk) return weapon?.passive_lv9 || '—';
  const entry   = Array.isArray(sk.data) ? sk.data[lv - 1] : null;
  const lv9entry = Array.isArray(sk.data) ? sk.data[8] : null;
  const template = weapon?.passive_lv9 || '';

  if (!entry || !lv9entry || !template) {
    // No template — just list current values
    if (entry && typeof entry === 'object') {
      return Object.values(entry).map(v =>
        '<span class="hl-atk">+' + (typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(1)) : v) + '</span>'
      ).join(' / ');
    }
    return template || '—';
  }

  // Build a sorted list of [key, lv9displayValue] pairs, longest values first
  // to avoid partial replacement (e.g. "210" before "21")
  const keys = Object.keys(lv9entry);
  const pairs = keys.map(k => {
    const v = lv9entry[k];
    const display = typeof v === 'number'
      ? (Number.isInteger(v) ? String(v) : v.toFixed(1))
      : String(v);
    return { k, display };
  }).sort((a, b) => b.display.length - a.display.length || b.display.localeCompare(a.display));

  // Replace each lv9 value with a placeholder, then substitute current value
  let result = template;
  for (const { k, display } of pairs) {
    // Use word-boundary aware replacement to avoid replacing "4" inside "44.8"
    result = result.replace(display, ' ' + k + ' ');
  }
  for (const { k } of pairs) {
    const v = entry[k];
    const display = typeof v === 'number'
      ? (Number.isInteger(v) ? String(v) : v.toFixed(1))
      : String(v);
    result = result.replace(' ' + k + ' ', '<span class="hl-atk">' + display + '</span>');
  }
  // Clean any unreplaced placeholders
  result = result.replace(/ \w+ /g, ' ');
  return result;
}


// A "stat skill" has a scalar data array (numbers, not objects).
// 3-star weapons use skill_index 1 for their effect (object array), not a second flat stat.
function isStatSkill(sk) {
  if (!sk || !Array.isArray(sk.data) || sk.data.length === 0) return false;
  return typeof sk.data[0] === 'number';
}

function resolveSkills(weapon) {
  const skills = DB_WEAPON_SKILLS[weapon.id] || [];
  let sk0 = skills.find(s => s.skill_index === 0 && isStatSkill(s)) || null;
  const sk1Candidate = skills.find(s => s.skill_index === 1) || null;
  let sk1 = isStatSkill(sk1Candidate) ? sk1Candidate : null;
  if (!sk0 && (weapon.stat1 || weapon.stat2)) {
    const makeStaticSk = (statStr) => {
      if (!statStr || statStr === '—') return null;
      const parsed = parseStatString(statStr);
      const maxVal = parsed?.maxVal ?? 0;
      const isPct  = parsed?.isPct ?? false;
      const data   = Array.from({length:9}, (_,i) => {
        const t = i / 8;
        const v = maxVal * (0.28 + 0.72 * Math.pow(t, 0.65));
        return isPct ? parseFloat(v.toFixed(1)) : Math.round(v);
      });
      if (isPct) data[8] = parseFloat(maxVal.toFixed(1));
      else data[8] = maxVal;
      const key = parsed?.key || 'main_attr';
      return { skill_index:0, id:key, name:statStr, skill_name:statStr, maxLv:9, defaultLv:4, data, render:resolveRenderFn(key, statStr, data) };
    };
    sk0 = makeStaticSk(weapon.stat1);
    sk1 = makeStaticSk(weapon.stat2);
    weapon._fallbackSk0 = sk0;
    weapon._fallbackSk1 = sk1;
  }
  return { sk0: sk0 || weapon._fallbackSk0 || null, sk1: sk1 || weapon._fallbackSk1 || null };
}

function statIcon(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('attack') || n.includes('atk'))
    return '<path d="M2 12L12 2M9 2h3v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>';
  if (n.includes('crit'))
    return '<circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M10 4l2 2-6 6-2-2z" stroke="currentColor" stroke-width="1.2"/>';
  if (n.includes('hp') || n.includes('health'))
    return '<path d="M7 2v5H2v4h5v5h4v-5h5V7h-5V2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>';
  if (n.includes('treatment') || n.includes('heal'))
    return '<path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
  if (n.includes('dmg') || n.includes('damage') || n.includes('bonus'))
    return '<polygon points="7,1 13,12 1,12" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/>';
  if (n.includes('intellect') || n.includes('arts'))
    return '<circle cx="7" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M3 13c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
  if (n.includes('will') || n.includes('agility') || n.includes('strength') || n.includes('main attr'))
    return '<path d="M4 10 L7 4 L10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 8h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
  if (n.includes('ult'))
    return '<path d="M7 1l1.8 3.8L13 5.6l-3 3 .7 4.4L7 10.8 2.3 13l.7-4.4-3-3 4.2-.8z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/>';
  return '<rect x="2" y="2" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/>';
}

function buildStatCard(sk, slotIdx, lv) {
  if (!sk) return '';
  const name  = sk.skill_name || sk.name || 'Attribute';
  const maxLv = sk.maxLv || 9;
  const pct   = ((lv - 1) / (maxLv - 1)) * 100;
  const val   = renderStatValue(sk, lv);
  const pips  = Array.from({length: maxLv}, (_, i) =>
    `<div class="stat-pip${i < lv ? ' lit' : ''}"></div>`
  ).join('');
  return `<div class="stat-card" id="statCard${slotIdx}">
    <div class="stat-card-top">
      <div class="stat-card-icon"><svg viewBox="0 0 14 14" fill="none">${statIcon(name)}</svg></div>
      <div class="stat-card-label">${name}</div>
      <div class="stat-card-stepper">
        <button class="ms-btn" id="skLvDn${slotIdx}" onclick="changeSkLvSlot(${slotIdx},-1)">−</button>
        <div class="ms-lv" id="skLvBadge${slotIdx}">${lv}/${maxLv}</div>
        <button class="ms-btn" id="skLvUp${slotIdx}" onclick="changeSkLvSlot(${slotIdx},1)">+</button>
      </div>
    </div>
    <div class="stat-card-val-row">
      <div class="stat-card-val" id="mainStatVal${slotIdx}">${val}</div>
    </div>
    <div class="stat-card-bar-wrap">
      <div class="stat-card-bar-fill" id="statBar${slotIdx}" style="width:${pct}%"></div>
    </div>
    <div class="stat-card-pips" id="statPips${slotIdx}">${pips}</div>
  </div>`;
}

function buildMainStats(weapon, lv) {
  const container = document.getElementById('mainStats');
  const { sk0, sk1 } = resolveSkills(weapon);
  container.innerHTML = buildStatCard(sk0, 0, curSkLv[0]) + buildStatCard(sk1, 1, curSkLv[1]);
}
function updateStatCard(sk, slotIdx, lv) {
  if (!sk) return;
  const maxLv = sk.maxLv || 9;
  const pct   = ((lv - 1) / (maxLv - 1)) * 100;
  const valEl = document.getElementById('mainStatVal' + slotIdx);
  const barEl = document.getElementById('statBar' + slotIdx);
  const badgeEl = document.getElementById('skLvBadge' + slotIdx);
  const pipsEl  = document.getElementById('statPips' + slotIdx);
  const dnEl  = document.getElementById('skLvDn' + slotIdx);
  const upEl  = document.getElementById('skLvUp' + slotIdx);
  if (valEl) {
    valEl.innerHTML = renderStatValue(sk, lv);
    valEl.classList.remove('bump'); void valEl.offsetWidth; valEl.classList.add('bump');
    setTimeout(() => valEl.classList.remove('bump'), 280);
  }
  if (barEl) barEl.style.width = pct + '%';
  if (badgeEl) badgeEl.textContent = lv + '/' + maxLv;
  if (pipsEl) pipsEl.innerHTML = Array.from({length: maxLv}, (_, i) =>
    `<div class="stat-pip${i < lv ? ' lit' : ''}"></div>`).join('');
  if (dnEl) dnEl.disabled = lv <= 1;
  if (upEl) upEl.disabled = lv >= maxLv;
}

function changeSkLvSlot(slotIdx, delta) {
  if (!curWeapon) return;
  const { sk0, sk1 } = resolveSkills(curWeapon);
  const skills = DB_WEAPON_SKILLS[curWeapon.id] || [];
  const skEff  = skills.find(s => s.skill_index === 2) ||
                 skills.find(s => s.skill_index === 1 && !isStatSkill(s)) || null;
  const maxLvs = [sk0?.maxLv || 9, sk1?.maxLv || 9, skEff?.maxLv || sk0?.maxLv || 9];
  curSkLv[slotIdx] = Math.max(1, Math.min(maxLvs[slotIdx], curSkLv[slotIdx] + delta));
  // keep legacy curSkillLevel in sync with slot 0 for saves
  if (slotIdx === 0) curSkillLevel = curSkLv[0];
  if (slotIdx === 0) updateStatCard(sk0, 0, curSkLv[0]);
  if (slotIdx === 1) updateStatCard(sk1, 1, curSkLv[1]);
  if (slotIdx === 2) buildEffectBlock(curWeapon, curSkLv[2]);
  scheduleSave();
}

// legacy
function changeSkLv(delta) { changeSkLvSlot(0, delta); }
function onSkSlider(val) { curSkLv[0] = parseInt(val); curSkillLevel = curSkLv[0]; updateMainStatValues(); scheduleSave(); }


function buildEffectBlock(weapon, lv) {
  const container = document.getElementById('skillsContainer');
  const skills = DB_WEAPON_SKILLS[weapon.id] || [];
  const skEff = skills.find(s => s.skill_index === 2) ||
                skills.find(s => s.skill_index === 1 && !isStatSkill(s)) || null;

  const anySkill = skEff || skills[0];
  const maxLv = anySkill?.maxLv || 9;
  const effectName = skEff?.skill_name || weapon.passive_name || 'Passive';

  let effectDesc;
  if (skEff && Array.isArray(skEff.data) && skEff.data.length > 0) {
    effectDesc = renderEffectDesc(skEff, lv, weapon);
  } else if (weapon.passive_lv9) {
    effectDesc = weapon.passive_lv9;
  } else {
    effectDesc = '—';
  }

  if (!effectName && !weapon.passive_lv9 && !skEff) {
    container.innerHTML = '';
    return;
  }

  const pct = ((lv - 1) / (maxLv - 1)) * 100;

  container.innerHTML =
    '<div class="effect-panel">' +
      '<div class="effect-panel-head">' +
        '<div class="effect-panel-icon"><svg viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 3.2L12 4.8l-2.5 2.4.6 3.8L7 9.2l-3.1 1.8.6-3.8L2 4.8l3.5-.6z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg></div>' +
        '<div class="effect-panel-label">Passive Effect</div>' +
        '<div class="effect-panel-stepper">' +
          '<button class="ms-btn" id="skLvDnEff" onclick="changeSkLvSlot(2,-1)">−</button>' +
          '<div class="ms-lv" id="skLvBadgeEff">'+lv+'/'+maxLv+'</div>' +
          '<button class="ms-btn" id="skLvUpEff" onclick="changeSkLvSlot(2,1)">+</button>' +
        '</div>' +
      '</div>' +
      '<div class="effect-panel-name">'+effectName+'</div>' +
      '<div class="effect-panel-desc" id="effectDescEl">'+effectDesc+'</div>' +
    '</div>';

  const dn = document.getElementById('skLvDnEff');
  const up = document.getElementById('skLvUpEff');
  if (dn) dn.disabled = lv <= 1;
  if (up) up.disabled = lv >= maxLv;
}


// Called by updateLevel — rebuilds both main stats and effect
function buildSkills(weapon) {
  buildMainStats(weapon, curSkLv[0]);
  buildEffectBlock(weapon, curSkLv[2]);
}

   ========================================================= */
(function initSlider(){
  const wrap = document.getElementById('sliderWrap');
  function posPct(e){
    const r = wrap.getBoundingClientRect();
    const x = (e.touches?e.touches[0].clientX:e.clientX)-r.left;
    return Math.max(0,Math.min(1,x/r.width));
  }
  wrap.addEventListener('mousedown', e=>{ dragging=true; const maxLv=curWeapon?MAX_LEVEL[curWeapon.rarity]||90:90; updateLevel(Math.round(posPct(e)*(maxLv-1))+1); });
  wrap.addEventListener('touchstart', e=>{ dragging=true; const maxLv=curWeapon?MAX_LEVEL[curWeapon.rarity]||90:90; updateLevel(Math.round(posPct(e)*(maxLv-1))+1); },{passive:true});
  document.addEventListener('mousemove', e=>{ if(!dragging||!curWeapon) return; const maxLv=MAX_LEVEL[curWeapon.rarity]||90; updateLevel(Math.round(posPct(e)*(maxLv-1))+1); });
  document.addEventListener('touchmove', e=>{ if(!dragging||!curWeapon) return; const maxLv=MAX_LEVEL[curWeapon.rarity]||90; updateLevel(Math.round(posPct(e)*(maxLv-1))+1); },{passive:true});
  document.addEventListener('mouseup', ()=>{ dragging=false; });
  document.addEventListener('touchend', ()=>{ dragging=false; });
})();

/* =========================================================
   TAGS
   ========================================================= */
function renderTags() {
  const row = document.getElementById('tagsRow');
  if (!curTags.length) { row.innerHTML=''; return; }
  row.innerHTML = curTags.map((t,i)=>`<div class="tag-chip" onclick="removeTag(${i})">${t}<span class="tag-x">✕</span></div>`).join('');
}
function addTag() {
  const inp = document.getElementById('tagInput');
  const val = inp.value.trim();
  if (!val||curTags.includes(val)||curTags.length>=8){inp.value='';return;}
  curTags.push(val); inp.value=''; renderTags(); scheduleSave();
}
function removeTag(i) { curTags.splice(i,1); renderTags(); scheduleSave(); }
document.getElementById('tagInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTag(); });
document.getElementById('notesArea').addEventListener('input', scheduleSave);

/* =========================================================
   SIDEBAR
   ========================================================= */
function setSbActive(id) {
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sb-'+id).classList.add('active');
}


/* =========================================================
   INIT
   ========================================================= */
async function init() {
  const authed = await initAuth();
  if (!authed) return; // redirected to auth.html
  await Promise.all([fetchWeapons(), fetchAllWeaponSkills(), fetchAllAtkCurves()]);
  document.getElementById('loadingOverlay').classList.add('hide');
  if (WEAPONS.length > 0) {
    const params    = new URLSearchParams(window.location.search);
    const urlId     = params.get('weapon');
    const validId   = urlId && WEAPONS.find(w=>w.id===urlId) ? urlId : null;
    const defaultId = validId || WEAPONS.find(w=>w.id==='forgeborn-scathe')?.id || WEAPONS[0].id;
    await loadWeapon(defaultId);
  }
}
function navigateWeapon(id) {
  const url = new URL(window.location);
  url.searchParams.set('weapon', id);
  window.history.replaceState({},'',url);
  loadWeapon(id);
  renderWpnList();
}
init();
</script>
