<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJIANG — Weapon Arsenal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/WipeHover.css">
    <link rel="stylesheet" href="css/NavBar.css">
    <style>
        :root {
            --bg: #07080b;
            --bg2: #0c0d12;
            --bord: rgba(255, 255, 255, .055);
            --bord2: rgba(255, 255, 255, .10);
            --text: #e4e0d8;
            --dim: #5a5868;
            --dim2: #8a8694;
            --gold: #d4943a;
            --gold2: #f0b866;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: clip;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, .025) 3px, rgba(0, 0, 0, .025) 4px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* HEADER */
        .page-hero {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--bord);
            margin-bottom: 20px;
        }

        .hero-left h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            letter-spacing: 7px;
            color: #fff;
            line-height: 1;
        }

        .hero-left .sub {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dim2);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero-left .sub::before {
            content: '';
            width: 30px;
            height: 1px;
            background: var(--gold);
            opacity: 0.6;
        }

        /* FILTER ZONE */
        .filter-zone {
            background: rgba(19, 21, 28, 0.95);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 24px 30px;
            margin-bottom: 30px;
            position: sticky;
            top: 40px;
            z-index: 999;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            transition: padding 0.3s ease;
            overflow: visible;
        }

        .search-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--bord2);
            border-radius: 6px;
            padding: 14px 20px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(212, 148, 58, 0.5);
            background: rgba(0, 0, 0, 0.5);
        }

        .filter-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--bord2);
            border-radius: 6px;
            padding: 0 20px;
            min-height: 48px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-toggle-btn img {
            width: 18px;
            height: 18px;
        }

        .filter-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(212, 148, 58, 0.5);
            color: var(--gold2);
        }

        .filter-zone.scrolled {
            padding: 15px 30px;
        }

        .filter-zone.scrolled .search-header {
            margin-bottom: 0;
            height: 48px;
        }

        .filter-row {
            display: none;
            flex-wrap: wrap;
            gap: 25px;
            position: absolute;
            top: 100%;
            left: -1px;
            right: -1px;
            z-index: 1000;
            background: rgba(19, 21, 28, 0.98);
            padding: 25px 30px;
            border: 1px solid var(--bord);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 0 12px 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
        }

        .filter-zone.dropdown-open .filter-row {
            display: flex;
        }

        .fgroup {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .flabel {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
        }

        .fpills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 360px;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px solid var(--bord2);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim2);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pill:hover {
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .pill-icon {
            width: 14px;
            height: 14px;
            object-fit: contain;
            opacity: 0.8;
        }

        .pill:hover .pill-icon,
        .pill.active .pill-icon {
            opacity: 1;
            filter: brightness(1.2);
        }

        /* rarity */
        .pill[data-val="6"].active {
            background: rgba(212, 148, 58, .18);
            color: var(--gold2);
            border-color: rgba(212, 148, 58, .5);
        }

        .pill[data-val="5"].active {
            background: rgba(195, 106, 42, .18);
            color: #e8956a;
            border-color: rgba(195, 106, 42, .5);
        }

        .pill[data-val="4"].active {
            background: rgba(124, 111, 232, .18);
            color: #b0a0ff;
            border-color: rgba(124, 111, 232, .5);
        }

        .pill[data-val="3"].active {
            background: rgba(96, 112, 144, .18);
            color: #b0c0d8;
            border-color: rgba(96, 112, 144, .4);
        }

        /* type */
        .pill[data-val="Sword"].active {
            background: rgba(224, 90, 43, .15);
            color: #ff8a65;
            border-color: rgba(224, 90, 43, .4);
        }

        .pill[data-val="Greatsword"].active {
            background: rgba(212, 148, 58, .15);
            color: var(--gold2);
            border-color: rgba(212, 148, 58, .4);
        }

        .pill[data-val="Polearm"].active {
            background: rgba(59, 130, 246, .15);
            color: #7ab8ff;
            border-color: rgba(59, 130, 246, .4);
        }

        .pill[data-val="Handcannon"].active {
            background: rgba(184, 144, 12, .15);
            color: #ffd25a;
            border-color: rgba(184, 144, 12, .4);
        }

        .pill[data-val="Arts Unit"].active {
            background: rgba(168, 85, 247, .15);
            color: #c89eff;
            border-color: rgba(168, 85, 247, .4);
        }

        /* stat */
        .pill[data-val="ATK"].active {
            background: rgba(224, 90, 43, .15);
            color: #ff8a65;
            border-color: rgba(224, 90, 43, .4);
        }

        .pill[data-val="HP"].active {
            background: rgba(42, 140, 82, .15);
            color: #6ddc9a;
            border-color: rgba(42, 140, 82, .4);
        }

        .pill[data-val="Crit"].active {
            background: rgba(212, 148, 58, .15);
            color: var(--gold2);
            border-color: rgba(212, 148, 58, .4);
        }

        .pill[data-val="Arts"].active {
            background: rgba(168, 85, 247, .15);
            color: #c89eff;
            border-color: rgba(168, 85, 247, .4);
        }

        .pill[data-val="Physical"].active {
            background: rgba(96, 112, 144, .16);
            color: #b0c0d8;
            border-color: rgba(96, 112, 144, .35);
        }

        .pill[data-val="Healing"].active {
            background: rgba(40, 180, 140, .15);
            color: #5eedc8;
            border-color: rgba(40, 180, 140, .4);
        }

        .pill.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .fclear {
            margin-left: auto;
            align-self: flex-end;
            padding: 8px 16px;
            border: 1px solid var(--bord);
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fclear:hover {
            color: #e05a5a;
            border-color: rgba(224, 90, 90, .4);
            background: rgba(224, 90, 90, 0.1);
        }

        /* RESULTS ROW */
        .results-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .results-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
        }

        .results-text span {
            color: var(--gold2);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .sort-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sort-btn.active {
            background: rgba(212, 148, 58, 0.15);
            color: var(--gold2);
            border-color: rgba(212, 148, 58, 0.5);
        }

        /* GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding-bottom: 80px;
            align-content: start;
            min-height: 80vh;
        }

        /* WEAPON CARD */
        .weap-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--bord2);
            background: var(--bg2);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        .weap-card:hover {
            transform: translateY(-6px);
        }

        .weap-card.hidden {
            display: none !important;
        }

        /* rarity stripe */
        .weap-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            z-index: 5;
        }

        .rarity-6::after {
            background: linear-gradient(180deg, #ffe06a, #c9902a);
        }

        .rarity-5::after {
            background: linear-gradient(180deg, #e89060, #9a4a1a);
        }

        .rarity-4::after {
            background: linear-gradient(180deg, #b09aee, #584890);
        }

        .rarity-3::after {
            background: linear-gradient(180deg, #7a8ea0, #445060);
        }

        /* hover glow by rarity */
        .rarity-6:hover {
            border-color: rgba(212, 148, 58, .5);
            box-shadow: 0 10px 30px rgba(212, 148, 58, .2);
        }

        .rarity-5:hover {
            border-color: rgba(195, 106, 42, .5);
            box-shadow: 0 10px 30px rgba(195, 106, 42, .2);
        }

        .rarity-4:hover {
            border-color: rgba(124, 111, 232, .5);
            box-shadow: 0 10px 30px rgba(124, 111, 232, .2);
        }

        .rarity-3:hover {
            border-color: rgba(96, 112, 144, .5);
            box-shadow: 0 10px 30px rgba(96, 112, 144, .2);
        }

        .card-art-placeholder {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            flex-shrink: 0;
        }

        .card-placeholder-letter {
            position: absolute;
            top: 10px;
            right: 14px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.05);
            line-height: 1;
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }

        .card-art {
            width: 100%;
            height: 110px;
            object-fit: cover;
            object-position: center 30%;
            display: block;
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .weap-card:hover .card-art {
            transform: scale(1.05);
        }

        .card-vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 130px;
            pointer-events: none;
            background: linear-gradient(180deg, transparent 40%, var(--bg2) 100%);
            z-index: 1;
        }

        /* type badge */
        .card-type-badge {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 6;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 0 0 0 8px;
            background: rgba(0, 0, 0, 0.7);
            border-left: 1px solid var(--bord2);
            border-bottom: 1px solid var(--bord2);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim2);
        }

        .type-icon-img {
            width: 14px;
            height: 14px;
            object-fit: contain;
            opacity: 0.85;
        }

        .card-info {
            padding: 12px 14px 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .card-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.35rem;
            letter-spacing: 1.5px;
            color: #fff;
            line-height: 1.1;
        }

        .card-stat-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--bord2);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim2);
            background: transparent;
            align-self: flex-start;
        }

        .card-passive-preview {
            font-size: 0.72rem;
            color: var(--dim2);
            line-height: 1.5;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 8px;
            border-top: 1px solid var(--bord);
        }

        .base-atk-badge {
            display: flex;
            flex-direction: column;
        }

        .atk-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
        }

        .atk-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--gold2);
            line-height: 1;
        }

        .card-stars {
            display: flex;
            gap: 2px;
        }

        .star-icon {
            width: 12px;
            height: 12px;
            object-fit: contain;
        }

        .star-svg {
            width: 12px;
            height: 12px;
            display: inline-block;
            background: var(--gold2);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .rarity-5 .star-svg {
            background: #e8956a;
        }

        .rarity-4 .star-svg {
            background: #b0a0ff;
        }

        .rarity-3 .star-svg {
            background: #b0c0d8;
        }

        .empty {
            grid-column: 1/-1;
            padding: 60px 20px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
        }

        @media (max-width:1024px) {
            .fpills {
                max-width: 280px;
            }
        }

        @media (max-width:860px) {
            .hero-left h1 {
                font-size: 3rem;
            }

            .filter-zone,
            .filter-zone.scrolled {
                padding: 20px;
            }

            .filter-row {
                gap: 15px;
            }

            .fpills {
                max-width: 100%;
            }

            .fclear {
                width: 100%;
                text-align: center;
                margin-top: 10px;
            }

            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (max-width:540px) {
            .container {
                padding: 0 15px;
            }

            .page-hero {
                padding: 40px 0 20px;
            }

            .hero-left h1 {
                font-size: 2.5rem;
            }

            .search-input {
                font-size: 0.9rem;
            }

            .fgroup {
                width: 100%;
            }

            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .card-name {
                font-size: 1.1rem;
            }

            .card-passive-preview {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="page-hero">
            <div class="hero-left">
                <h1>Weapon Arsenal</h1>
                <div class="sub">Arknights: Endfield · Equipment Database</div>
            </div>
        </div>

        <div class="filter-zone" id="filterZone">
            <div class="search-header">
                <input type="text" id="weapSearch" class="search-input" placeholder="Search by weapon name...">
                <button id="filterToggleBtn" class="filter-toggle-btn">
                    <img src="https://api.iconify.design/mdi:filter-variant.svg?color=%23ffffff" alt="">
                    Filters
                </button>
            </div>

            <div class="filter-row" id="filterRow">
                <div class="fgroup">
                    <div class="flabel">Rarity</div>
                    <div class="fpills" data-group="rarity">
                        <button class="pill" data-val="6">6 ★</button>
                        <button class="pill" data-val="5">5 ★</button>
                        <button class="pill" data-val="4">4 ★</button>
                        <button class="pill" data-val="3">3 ★</button>
                    </div>
                </div>
                <div class="fgroup">
                    <div class="flabel">Type</div>
                    <div class="fpills" data-group="type">
                        <button class="pill" data-val="Sword">Sword</button>
                        <button class="pill" data-val="Greatsword">Greatsword</button>
                        <button class="pill" data-val="Polearm">Polearm</button>
                        <button class="pill" data-val="Handcannon">Handcannon</button>
                        <button class="pill" data-val="Arts Unit">Arts Unit</button>
                    </div>
                </div>
                <div class="fgroup">
                    <div class="flabel">Stat Focus</div>
                    <div class="fpills" data-group="stat">
                        <button class="pill" data-val="ATK">ATK</button>
                        <button class="pill" data-val="HP">HP</button>
                        <button class="pill" data-val="Crit">Crit Rate</button>
                        <button class="pill" data-val="Arts">Arts DMG</button>
                        <button class="pill" data-val="Physical">Physical DMG</button>
                        <button class="pill" data-val="Healing">Healing</button>
                    </div>
                </div>
                <button class="fclear" id="clearBtn">✕ Reset Filters</button>
            </div>
        </div>

        <div class="results-row">
            <div class="results-text">Showing <span id="visNum">0</span> weapons</div>
            <div class="sort-group">
                <span class="flabel" style="margin-right:8px;">Sort By:</span>
                <button class="pill sort-btn active" data-sort="rarity">Rarity</button>
                <button class="pill sort-btn" data-sort="name">Name</button>
                <button class="pill sort-btn" data-sort="atk">Base ATK</button>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>
    </div>

    <script>
        // ── ASSET PATHS ─────────────────────────────────────────
        // Replace these with your actual local paths when ready.
        const STAR_IMAGE = "assets/RarityAssets/StarIcon.png";

        const TYPE_ICONS = {
            "Sword": "assets/WeaponCharAssets/Short-Weapon.webp",
            "Greatsword": "assets/WeaponCharAssets/36px-Great_Sword.webp",
            "Polearm": "assets/WeaponCharAssets/36px-Polearm.webp",
            "Handcannon": "assets/WeaponCharAssets/36px-Handcannon.webp",
            "Arts Unit": "assets/WeaponCharAssets/36px-Arts_Unit.png"
        };

        const STAT_COLORS = {
            ATK: { bg: "rgba(224,90,43,.18)", color: "#ff8a65", border: "rgba(224,90,43,.4)" },
            HP: { bg: "rgba(42,140,82,.18)", color: "#6ddc9a", border: "rgba(42,140,82,.4)" },
            Crit: { bg: "rgba(212,148,58,.18)", color: "#f0b866", border: "rgba(212,148,58,.4)" },
            Arts: { bg: "rgba(168,85,247,.18)", color: "#c89eff", border: "rgba(168,85,247,.4)" },
            Physical: { bg: "rgba(96,112,144,.18)", color: "#b0c0d8", border: "rgba(96,112,144,.35)" },
            Healing: { bg: "rgba(40,180,140,.18)", color: "#5eedc8", border: "rgba(40,180,140,.4)" },
        };

        // ── WEAPON DATA ─────────────────────────────────────────
        const WEAPONS = [
            // 6-STAR

            // 3-STAR
            { id: "darhoff-7", name: "Darhoff 7", rarity: 3, type: "Greatsword", baseAtk: 283, stat: "ATK", statLabel: "Flat ATK +34", passive: "Standard-issue field weapon. No conditional passive.", img: "" },
            { id: "mk-i-blade", name: "Mk.I Blade", rarity: 3, type: "Sword", baseAtk: 270, stat: "ATK", statLabel: "Flat ATK +28", passive: "Entry-level sword. Basic passive: ATK +10% after Battle Skill cast.", img: "" },
            { id: "standard-lance", name: "Standard Lance", rarity: 3, type: "Polearm", baseAtk: 268, stat: "ATK", statLabel: "Flat ATK +28", passive: "Entry-level polearm. Basic passive: ATK +10% after Battle Skill cast.", img: "" },
            { id: "field-gun-i", name: "Field Gun I", rarity: 3, type: "Handcannon", baseAtk: 265, stat: "ATK", statLabel: "Flat ATK +26", passive: "Entry-level handcannon. Basic passive: ATK +10% after Battle Skill cast.", img: "" },
            { id: "orbiter-unit", name: "Orbiter Unit", rarity: 3, type: "Arts Unit", baseAtk: 255, stat: "Arts", statLabel: "Arts DMG +12%", passive: "Entry-level arts unit. Basic passive: Arts DMG +8% on Combo Skill cast.", img: "" },
        ];

        // ── RENDER ──────────────────────────────────────────────
        const grid = document.getElementById('cardGrid');
        const searchInput = document.getElementById('weapSearch');
        const filters = { rarity: new Set(), type: new Set(), stat: new Set() };
        let currentSort = 'rarity';

        function starHTML(rarity) {
            return Array(rarity).fill(0).map(() =>
                `<img src="${STAR_IMAGE}" class="star-icon" alt="★" onerror="this.outerHTML='<span class=\\'star-svg\\'></span>'">`
            ).join('');
        }

        function createCard(w) {
            const sc = STAT_COLORS[w.stat] || {};
            const statStyle = sc.bg ? `style="background:${sc.bg};color:${sc.color};border-color:${sc.border}"` : '';
            const typeIcon = TYPE_ICONS[w.type] || '';
            const preview = w.passive.length > 90 ? w.passive.substring(0, 87) + '…' : w.passive;
            const artHTML = w.img
                ? `<img src="${w.img}" class="card-art" onerror="this.outerHTML='<div class=\\'card-art-placeholder\\'></div>'">`
                : `<div class="card-art-placeholder"></div>`;

            return `
    <div class="weap-card rarity-${w.rarity}"
         data-name="${w.name.toLowerCase()}"
         data-rarity="${w.rarity}"
         data-type="${w.type}"
         data-stat="${w.stat}"
         data-atk="${w.baseAtk}"
         onclick="window.location.href='WeaponDetail.html?weapon=${w.id}'">
      <div class="card-placeholder-letter">${w.name.charAt(0)}</div>
      ${artHTML}
      <div class="card-vignette"></div>
      <div class="card-type-badge">
        ${typeIcon ? `<img src="${typeIcon}" class="type-icon-img" onerror="this.style.display='none'" alt="">` : ''}
        <span>${w.type}</span>
      </div>
      <div class="card-info">
        <div class="card-name">${w.name}</div>
        <div class="card-stat-tag" ${statStyle}>${w.statLabel}</div>
        <div class="card-passive-preview">${preview}</div>
        <div class="card-footer">
          <div class="base-atk-badge">
            <span class="atk-label">Base ATK</span>
            <span class="atk-val">${w.baseAtk}</span>
          </div>
          <div class="card-stars">${starHTML(w.rarity)}</div>
        </div>
      </div>
    </div>`;
        }

        function updateFilters() {
            const q = searchInput.value.toLowerCase();
            let visible = 0;
            document.querySelectorAll('.weap-card').forEach(card => {
                const ok =
                    card.dataset.name.includes(q) &&
                    (filters.rarity.size === 0 || filters.rarity.has(card.dataset.rarity)) &&
                    (filters.type.size === 0 || filters.type.has(card.dataset.type)) &&
                    (filters.stat.size === 0 || filters.stat.has(card.dataset.stat));
                card.classList.toggle('hidden', !ok);
                if (ok) visible++;
            });
            document.getElementById('visNum').innerText = visible;
            const empty = grid.querySelector('.empty');
            if (visible === 0) { if (!empty) grid.insertAdjacentHTML('beforeend', '<div class="empty">No weapons match the selected filters.</div>'); }
            else if (empty) empty.remove();
        }

        function applySort() {
            const cards = Array.from(grid.children).filter(c => c.classList.contains('weap-card'));
            cards.sort((a, b) => {
                if (currentSort === 'rarity') {
                    const d = parseInt(b.dataset.rarity) - parseInt(a.dataset.rarity);
                    return d !== 0 ? d : a.dataset.name.localeCompare(b.dataset.name);
                }
                if (currentSort === 'name') return a.dataset.name.localeCompare(b.dataset.name);
                if (currentSort === 'atk') return parseInt(b.dataset.atk) - parseInt(a.dataset.atk);
            });
            cards.forEach(c => grid.appendChild(c));
        }

        // Boot
        grid.innerHTML = WEAPONS.map(createCard).join('');
        updateFilters();
        applySort();

        // Inject icons into filter pills
        document.querySelectorAll('.filter-row .pill').forEach(pill => {
            const group = pill.closest('[data-group]')?.dataset.group;
            const val = pill.dataset.val;
            if (group === 'type' && TYPE_ICONS[val])
                pill.innerHTML = `<img src="${TYPE_ICONS[val]}" class="pill-icon" onerror="this.style.display='none'" alt=""> ` + pill.innerHTML;
            if (group === 'rarity')
                pill.innerHTML = `<img src="${STAR_IMAGE}" class="pill-icon" onerror="this.style.display='none'" alt=""> ` + pill.innerHTML;
        });

        // Search
        searchInput.addEventListener('input', updateFilters);

        // Filter pills
        document.querySelectorAll('.filter-row .pill').forEach(btn => {
            btn.addEventListener('click', () => {
                const group = btn.closest('[data-group]')?.dataset.group;
                const val = btn.dataset.val;
                if (!group) return;
                if (filters[group].has(val)) { filters[group].delete(val); btn.classList.remove('active'); }
                else { filters[group].add(val); btn.classList.add('active'); }
                updateFilters();
            });
        });

        // Clear
        document.getElementById('clearBtn').addEventListener('click', () => {
            searchInput.value = '';
            filters.rarity.clear(); filters.type.clear(); filters.stat.clear();
            document.querySelectorAll('.filter-row .pill').forEach(b => b.classList.remove('active'));
            updateFilters();
        });

        // Sort
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.dataset.sort;
                applySort();
            });
        });

        // Sticky scroll
        const filterZone = document.getElementById('filterZone');
        const filterToggleBtn = document.getElementById('filterToggleBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 150) { filterZone.classList.add('scrolled'); }
            else if (window.scrollY < 80) { filterZone.classList.remove('scrolled'); filterZone.classList.remove('dropdown-open'); }
        });
        filterToggleBtn.addEventListener('click', () => filterZone.classList.toggle('dropdown-open'));
    </script>
    <script src="js/NavBar.js"></script>
    <script>
        NavBar.init({ sections: [] });
    </script>
