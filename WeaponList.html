<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJIANG — Weapon Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/NavBar.css">
  <link rel="stylesheet" href="css/WipeHover.css">
  <link rel="stylesheet" href="css/MainStyle.css">
  <link rel="stylesheet" href="css/LogIn.css">
  <link rel="stylesheet" href="css/WeaponList.css">
</head>
<body>

<!-- GUIDED TOUR OVERLAY -->
<div class="tour-overlay" id="tourOverlay">
  <div class="tour-spotlight" id="tourSpotlight"></div>
  <div class="tour-card" id="tourCard">
    <div class="tour-step-label">
      <span id="tourStepNum">Step 1 of 6</span>
      <div class="tour-step-dots" id="tourDots"></div>
    </div>
    <div class="tour-title" id="tourTitle">Welcome</div>
    <div class="tour-desc" id="tourDesc">Let's walk you through the page.</div>
    <div class="tour-actions">
      <button class="tour-skip" id="tourSkip" onclick="endTour()">Skip Tour</button>
      <div class="tour-nav">
        <button class="tour-btn" id="tourPrev" onclick="tourStep(-1)">← Back</button>
        <button class="tour-btn primary" id="tourNext" onclick="tourStep(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<div class="page-wrap">

  <div class="page-hero">
    <div class="hero-left">
      <h1>Weapon Database</h1>
      <div class="sub">Arknights: Endfield · Weapon Overview</div>
    </div>
    <button class="help-btn" id="helpBtn" onclick="startTour()" title="Page Tour">?</button>
  </div>

  <div class="filter-zone" id="filterZone">
    <div class="search-header">
      <input type="text" id="wpnSearch" class="search-input" placeholder="Search by weapon name...">
      <button id="filterToggleBtn" class="filter-toggle-btn">
        <img src="https://api.iconify.design/mdi:filter-variant.svg?color=%23ffffff" alt="">
        Filters
      </button>
    </div>

    <div class="filter-row" id="filterRow">

      <div class="fgroup">
        <div class="flabel">Rarity</div>
        <div class="fpills" data-group="rarity">
          <button class="pill" data-val="6">6 ★</button>
          <button class="pill" data-val="5">5 ★</button>
          <button class="pill" data-val="4">4 ★</button>
          <button class="pill" data-val="3">3 ★</button>
        </div>
      </div>

      <div class="fgroup">
        <div class="flabel">Type</div>
        <div class="fpills" data-group="type">
          <button class="pill" data-val="Sword">Sword</button>
          <button class="pill" data-val="Greatsword">Greatsword</button>
          <button class="pill" data-val="Polearm">Polearm</button>
          <button class="pill" data-val="Handcannon">Handcannon</button>
          <button class="pill" data-val="Arts Unit">Arts Unit</button>
        </div>
      </div>

      <div class="fgroup full-width">
        <div class="flabel">Filter by Stat</div>
        <div class="fpills" data-group="stat">
          <button class="pill stat-tag" data-val="ATK">ATK (Flat)</button>
          <button class="pill stat-tag" data-val="ATK%">ATK%</button>
          <button class="pill stat-tag" data-val="HP">Max HP</button>
          <button class="pill stat-tag" data-val="Crit Rate">Crit Rate</button>
          <button class="pill stat-tag" data-val="Main Attribute">Main Attribute</button>
          <button class="pill stat-tag" data-val="AGI">Agility</button>
          <button class="pill stat-tag" data-val="INT">Intellect</button>
          <button class="pill stat-tag" data-val="STR">Strength</button>
          <button class="pill stat-tag" data-val="WILL">Will</button>
          <button class="pill stat-tag" data-val="Cryo DMG">Cryo DMG</button>
          <button class="pill stat-tag" data-val="Electric DMG">Electric DMG</button>
          <button class="pill stat-tag" data-val="Heat DMG">Heat DMG</button>
          <button class="pill stat-tag" data-val="Nature DMG">Nature DMG</button>
          <button class="pill stat-tag" data-val="Physical DMG">Physical DMG</button>
          <button class="pill stat-tag" data-val="Arts DMG">Arts DMG</button>
          <button class="pill stat-tag" data-val="Arts Intensity">Arts Intensity</button>
          <button class="pill stat-tag" data-val="Ultimate Gain">Ult. Gain Eff.</button>
        </div>
      </div>

      <div class="fgroup">
        <div class="flabel">Roster</div>
        <div class="fpills">
          <button class="pill" id="pill-owned" data-val="owned">✓ Owned Only</button>
        </div>
      </div>

      <button class="fclear" id="clearBtn">✕ Reset Filters</button>
    </div>
  </div>

  <div class="results-row">
    <div class="results-text">Showing <span id="visNum">0</span> weapons</div>
    <div class="sort-group">
      <span class="flabel">Sort By:</span>
      <button class="pill sort-btn active" data-sort="rarity">Rarity</button>
      <button class="pill sort-btn" data-sort="name">Name</button>
      <button class="pill sort-btn" data-sort="atk">Base ATK</button>
      <button class="pill sort-btn" data-sort="level">Level</button>
    </div>
  </div>

  <div class="card-grid" id="cardGrid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/WeaponList.js"></script>
<script src="js/TextGlitch.js"></script>
<script src="js/NavBar.js"></script>
<script src="js/LogIn.js"></script>
<script>
  NavBar.init({ sections: [] });
</script>
</body>
</html>
