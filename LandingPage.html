<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJIANG: A Comprehensive Web-Based Information System for Skill Optimization, Material Logistics, and Player Quality-of-Life in Arknights: Endfield</title>

</head>
<body>
      <!-- 
      DJIANG Landing Page Section
      ────────────────────────────────────────────────────────────────
      Designed to be injected into any parent div via HTML-fetcher.js.

      The parent div controls positioning:
        • position: relative  → flows in document
        • position: absolute  → anchored to nearest positioned ancestor
        • position: fixed     → anchored to viewport

      All internal elements (HUD, hero, etc.) are positioned relative
      to .lp-root, NOT the viewport, so nothing breaks on injection.
      ────────────────────────────────────────────────────────────────
    -->
    <div class="landing-page">
      <link rel="stylesheet" href="css/landingPage.css">


      <!-- HERO SECTION -->
      <section id="hero">
        <div class="hero-bg"></div>
        <div class="hero-scanlines"></div>
        <canvas id="heroCanvas"></canvas>

        <div class="ui-corner tl"></div>
        <div class="ui-corner tr"></div>
        <div class="ui-corner bl"></div>
        <div class="ui-corner br"></div>
        <div class="ui-crosshair"></div>
        <div class="ui-camera"></div>

        <span class="ui-counter c1">01P</span>
        <span class="ui-counter c2">02G</span>
        <span class="ui-counter c3">03B</span>

        <p class="hero-blurb">
          DJIANG is a high-performance web companion for Arknights: Endfield designed to streamline gameplay.
          It eliminates "logistical friction" by centralizing complex industrial data and combat mechanics into
          a single, efficient interface.
        </p>

        <div class="hero-headline">
          <span class="line">PLAN.</span>
          <span class="line">GUIDE.</span>
          <span class="line">BUILD.</span>
        </div>

        <div class="scroll-hint">
          Scroll
          <svg width="12" height="16" viewBox="0 0 12 16" fill="none">
            <path d="M6 0v13M1 9l5 7 5-7" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
      </section>

      <section id="operators"></section>

    </div><!-- /.lp-root -->

</body>
</html>
